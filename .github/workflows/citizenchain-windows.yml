name: CitizenChain Windows

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/citizenchain-windows.yml"
      - "citizenchain/node/**"
      - "citizenchain/nodeui/**"
      - "citizenchain/runtime/**"
      - "citizenchain/Cargo.toml"
      - "citizenchain/Cargo.lock"
  workflow_dispatch:

concurrency:
  group: citizenchain-windows-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-windows:
    name: 打包 公民链.exe (Windows)
    runs-on: windows-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@1.94.0

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: citizenchain/nodeui/frontend/package-lock.json

      - name: 安装 protobuf
        run: choco install protoc -y

      - name: 安装 LLVM 并配置环境变量
        run: |
          choco install llvm -y
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\lib" >> $env:GITHUB_ENV

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "citizenchain-windows"
          workspaces: |
            citizenchain -> target
            citizenchain/nodeui -> target

      - name: 下载最新 WASM 产物
        run: gh run download --name citizenchain-wasm --dir wasm-artifact -R ${{ env.GITHUB_REPOSITORY }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: 确认 WASM 文件位置
        run: dir wasm-artifact\

      - name: 设置 WASM_FILE
        run: echo "WASM_FILE=${{ github.workspace }}/wasm-artifact/citizenchain.compact.compressed.wasm" >> $env:GITHUB_ENV

      - name: 编译 node
        working-directory: citizenchain
        run: cargo build --release -p node

      - name: 准备 sidecar
        shell: pwsh
        run: |
          $backendDir = "citizenchain/nodeui/backend"
          $binDir = "$backendDir/binaries"
          $nodeBin = "citizenchain/target/release/node.exe"
          $targetTriple = (rustc -vV | Select-String 'host:').ToString().Split(' ')[1]

          New-Item -ItemType Directory -Force -Path $binDir | Out-Null
          Copy-Item $nodeBin "$binDir/citizenchain-node.exe"
          Copy-Item $nodeBin "$binDir/citizenchain-node-${targetTriple}.exe"
          $hash = (Get-FileHash "$binDir/citizenchain-node.exe" -Algorithm SHA256).Hash.ToLower()
          Set-Content "$binDir/citizenchain-node.sha256" $hash

          Write-Host "sidecar 已准备:"
          Get-ChildItem $binDir

      - name: 安装前端依赖并构建
        run: |
          npm --prefix citizenchain/nodeui/frontend ci
          npm --prefix citizenchain/nodeui/frontend run build

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Tauri 打包
        working-directory: citizenchain/nodeui/backend
        env:
          SKIP_NODE_BUILD: "1"
        run: cargo tauri build --ci

      - name: 重命名产物
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "citizenchain/nodeui/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          Copy-Item $exe.FullName "公民链.exe"
          Write-Host "产出: 公民链.exe ($([math]::Round($exe.Length / 1MB, 1)) MB)"

      - name: 上传 公民链.exe
        uses: actions/upload-artifact@v4
        with:
          name: 公民链-windows
          path: 公民链.exe
          retention-days: 30
          overwrite: true
