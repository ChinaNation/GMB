name: CitizenChain Windows

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/citizenchain-windows.yml"
      - "citizenchain/node/**"
      - "citizenchain/runtime/**"
      - "citizenchain/Cargo.toml"
      - "citizenchain/Cargo.lock"
  workflow_dispatch:

concurrency:
  group: citizenchain-windows-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-windows:
    name: 打包公民链.exe (Windows)
    runs-on: windows-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@1.94.0

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: citizenchain/node/frontend/package-lock.json

      - name: 安装 protobuf
        run: choco install protoc -y

      - name: 安装 LLVM 并配置环境变量
        run: |
          choco install llvm -y
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\lib" >> $env:GITHUB_ENV

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "citizenchain-windows"
          workspaces: citizenchain -> target

      - name: 下载最新 WASM 产物
        run: gh run download --name citizenchain-wasm --dir wasm-artifact -R ${{ env.GITHUB_REPOSITORY }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: 设置 WASM_FILE
        run: echo "WASM_FILE=${{ github.workspace }}/wasm-artifact/citizenchain.compact.compressed.wasm" >> $env:GITHUB_ENV

      - name: 安装前端依赖并构建
        run: |
          npm --prefix citizenchain/node/frontend ci
          npm --prefix citizenchain/node/frontend run build

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Tauri 打包
        working-directory: citizenchain/node
        run: cargo tauri build --ci

      - name: 重命名产物
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "citizenchain/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          Copy-Item $exe.FullName "公民链.exe"
          Write-Host "产出: 公民链.exe ($([math]::Round($exe.Length / 1MB, 1)) MB)"

      - name: 上传公民链.exe
        uses: actions/upload-artifact@v4
        with:
          name: 公民链-windows
          path: 公民链.exe
          retention-days: 30
          overwrite: true
