name: CitizenChain Windows

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: citizenchain-windows-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-windows:
    name: 打包公民链.exe (Windows)
    runs-on: windows-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@1.94.0

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: citizenchain/node/frontend/package-lock.json

      - name: 安装 protobuf
        run: choco install protoc -y

      - name: 安装 LLVM 并配置环境变量
        run: |
          choco install llvm -y
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\lib" >> $env:GITHUB_ENV

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "citizenchain-windows"
          workspaces: citizenchain -> target

      - name: 安装前端依赖并构建
        run: |
          npm --prefix citizenchain/node/frontend ci
          npm --prefix citizenchain/node/frontend run build

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Tauri 打包
        working-directory: citizenchain/node
        run: cargo tauri build --ci

      - name: 重命名产物
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "citizenchain/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          Copy-Item $exe.FullName "公民链.exe"
          Write-Host "产出: 公民链.exe ($([math]::Round($exe.Length / 1MB, 1)) MB)"

      - name: 上传公民链.exe
        uses: actions/upload-artifact@v4
        with:
          name: 公民链-windows
          path: 公民链.exe
          retention-days: 30
          overwrite: true

      - name: 删除上一次 Windows CI
        if: ${{ success() }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_FILE: citizenchain-windows.yml
          CURRENT_REPOSITORY: ${{ github.repository }}
        run: |
          $runs = gh api "repos/$env:CURRENT_REPOSITORY/actions/workflows/$env:WORKFLOW_FILE/runs?branch=main&status=completed&per_page=10" | ConvertFrom-Json
          $previous = $runs.workflow_runs | Select-Object -First 1
          if ($null -eq $previous) {
            Write-Host "没有可删除的上一条 Windows CI"
            exit 0
          }
          Write-Host "删除上一条 Windows CI run: $($previous.id)"
          gh api -X DELETE "repos/$env:CURRENT_REPOSITORY/actions/runs/$($previous.id)"
