name: CitizenWallet CI

on:
  push:
    branches: [main]
    # 中文注释:按 ci-path-routing——runtime/** 改动只走 citizenchain-wasm.yml。
    # 钱包 CI 只由钱包自身代码触发,不再监听 runtime 文件,做到 runtime 推送「只允许 WASM CI」。
    paths:
      - ".github/workflows/citizenwallet-ci.yml"
      - ".fvm/fvm_config.json"
      - "citizenwallet/**"
  workflow_dispatch:
    inputs:
      mode:
        description: 执行 CI 或正式发布
        required: true
        type: choice
        options:
          - ci
          - release

env:
  GMB_RELEASE_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'release' }}

concurrency:
  group: citizenwallet-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: 构建 公民钱包.apk
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 读取 Flutter 版本
        id: flutter-version
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          version = json.loads(Path(".fvm/fvm_config.json").read_text(encoding="utf-8"))["flutterSdkVersion"]
          print(f"version={version}")
          PY

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter-version.outputs.version }}

      - name: 同步 runtime pallet/call 索引
        run: |
          set -euo pipefail

          RUNTIME_LIB=citizenchain/runtime/src/lib.rs
          REGISTRY=citizenwallet/lib/signer/pallet_registry.dart
          TRANSFER_PALLET=citizenchain/runtime/transaction/multisig/src/lib.rs
          JOINT_VOTE_PALLET=citizenchain/runtime/votingengine/joint-vote/src/lib.rs

          ONCHAIN_TRANSACTION_IDX=$(grep -B1 'pub type OnchainTransaction' "$RUNTIME_LIB" | grep -o 'pallet_index([0-9]*)' | grep -o '[0-9]*')
          MULTISIG_IDX=$(grep -B1 'pub type MultisigTransfer' "$RUNTIME_LIB" | grep -o 'pallet_index([0-9]*)' | grep -o '[0-9]*')
          VOTING_IDX=$(grep -B1 'pub type VotingEngine' "$RUNTIME_LIB" | grep -o 'pallet_index([0-9]*)' | grep -o '[0-9]*')

          PROPOSE_CALL=$(grep -B2 'fn propose_transfer' "$TRANSFER_PALLET" | grep -o 'call_index([0-9]*)' | grep -o '[0-9]*')
          # 联合投票内部投票阶段:JointVote::cast_admin
          JOINT_CALL=$(grep -B2 'fn cast_admin' "$JOINT_VOTE_PALLET" | grep -o 'call_index([0-9]*)' | grep -o '[0-9]*')
          # 联合公投阶段:JointVote::cast_referendum
          REFERENDUM_CALL=$(grep -B2 'fn cast_referendum' "$JOINT_VOTE_PALLET" | grep -o 'call_index([0-9]*)' | grep -o '[0-9]*')

          test -n "$ONCHAIN_TRANSACTION_IDX" || { echo "::error::未找到 OnchainTransaction pallet_index"; exit 1; }
          test -n "$MULTISIG_IDX" || { echo "::error::未找到 MultisigTransfer pallet_index"; exit 1; }
          test -n "$VOTING_IDX" || { echo "::error::未找到 VotingEngine pallet_index"; exit 1; }
          test -n "$PROPOSE_CALL" || { echo "::error::未找到 MultisigTransfer::propose_transfer call_index"; exit 1; }
          test -n "$JOINT_CALL" || { echo "::error::未找到 JointVote::cast_admin call_index"; exit 1; }
          test -n "$REFERENDUM_CALL" || { echo "::error::未找到 JointVote::cast_referendum call_index"; exit 1; }

          sed -i "s/onchainTransactionPallet = [0-9]*/onchainTransactionPallet = $ONCHAIN_TRANSACTION_IDX/" "$REGISTRY"
          sed -i "s/multisigTransferPallet = [0-9]*/multisigTransferPallet = $MULTISIG_IDX/" "$REGISTRY"
          sed -i "s/votingEnginePallet = [0-9]*/votingEnginePallet = $VOTING_IDX/" "$REGISTRY"
          sed -i "s/proposeTransferCall = [0-9]*/proposeTransferCall = $PROPOSE_CALL/" "$REGISTRY"
          sed -i "s/jointVoteCall = [0-9]*/jointVoteCall = $JOINT_CALL/" "$REGISTRY"
          sed -i "s/castReferendumCall = [0-9]*/castReferendumCall = $REFERENDUM_CALL/" "$REGISTRY"

          echo "OnchainTransaction=$ONCHAIN_TRANSACTION_IDX MultisigTransfer=$MULTISIG_IDX VotingEngine=$VOTING_IDX"
          echo "propose=$PROPOSE_CALL joint=$JOINT_CALL referendum=$REFERENDUM_CALL"

      - name: 安装依赖
        working-directory: citizenwallet
        run: flutter pub get

      - name: 写入 Android release keystore
        if: ${{ env.GMB_RELEASE_MODE == 'true' }}
        env:
          GMB_APP_KEY: ${{ secrets.GMB_APP_KEY }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          raw = os.environ.get("GMB_APP_KEY", "").strip()
          if not raw:
              raise SystemExit("手动发布缺少 GMB_APP_KEY secret。")

          props = {}
          for line in raw.splitlines():
              line = line.strip()
              if not line or line.startswith("#"):
                  continue
              if "=" not in line:
                  raise SystemExit("GMB_APP_KEY 每行必须使用 key=value 格式。")
              key, value = line.split("=", 1)
              props[key.strip()] = value.strip()

          keystore_b64 = props.get("keystore")
          password = props.get("password")
          alias = props.get("alias", "upload")
          key_password = props.get("keyPassword", password)
          if not keystore_b64 or not password:
              raise SystemExit("GMB_APP_KEY 必须包含 keystore=<base64后的jks> 和 password=<密码>。")

          workspace = Path(os.environ["GITHUB_WORKSPACE"])
          android_dir = workspace / "citizenwallet" / "android"
          keystore_path = android_dir / "gmb-app-release.jks"
          keystore_path.write_bytes(base64.b64decode(keystore_b64))

          # 中文注释：两个移动端共用同一套 GMB_APP_KEY；alias 随现有 keystore 写入，key 密码默认复用 keystore 密码。
          (android_dir / "key.properties").write_text(
              "\n".join(
                  [
                      f"storeFile={keystore_path}",
                      f"storePassword={password}",
                      f"keyAlias={alias}",
                      f"keyPassword={key_password}",
                      "",
                  ]
              ),
              encoding="utf-8",
          )
          PY

      - name: 分析代码
        working-directory: citizenwallet
        run: flutter analyze --no-fatal-infos

      - name: 运行测试
        working-directory: citizenwallet
        run: flutter test

      # 中文注释：push 自动 CI 只做工程构建检查，不读取正式签名 keystore。
      - name: 构建 Debug APK（push 检查）
        if: ${{ env.GMB_RELEASE_MODE != 'true' }}
        working-directory: citizenwallet
        run: flutter build apk --debug

      - name: 构建正式 APK
        if: ${{ env.GMB_RELEASE_MODE == 'true' }}
        working-directory: citizenwallet
        run: flutter build apk --release

      - name: 重命名产物
        if: ${{ env.GMB_RELEASE_MODE == 'true' }}
        run: |
          cp citizenwallet/build/app/outputs/flutter-apk/app-release.apk citizenwallet/build/app/outputs/flutter-apk/公民钱包.apk
          echo "产出: 公民钱包.apk"

      - name: 上传 公民钱包.apk
        if: ${{ env.GMB_RELEASE_MODE == 'true' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: 公民钱包
          path: citizenwallet/build/app/outputs/flutter-apk/公民钱包.apk
          retention-days: 30
          overwrite: true
          if-no-files-found: error
