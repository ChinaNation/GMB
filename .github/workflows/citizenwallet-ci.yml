name: CitizenWallet CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/citizenwallet-ci.yml"
      - "citizenwallet/**"
      - "citizenchain/runtime/src/lib.rs"
      - "citizenchain/runtime/transaction/duoqian-transfer/src/lib.rs"
      - "citizenchain/runtime/votingengine/joint-vote/src/lib.rs"
      - "citizenchain/runtime/votingengine/internal-vote/src/lib.rs"
  workflow_dispatch:

concurrency:
  group: citizenwallet-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: 构建 公民钱包.apk
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: 同步 runtime pallet/call 索引
        run: |
          RUNTIME_LIB=citizenchain/runtime/src/lib.rs
          REGISTRY=citizenwallet/lib/signer/pallet_registry.dart
          TRANSFER_PALLET=citizenchain/runtime/transaction/duoqian-transfer/src/lib.rs
          JOINT_VOTE_PALLET=citizenchain/runtime/votingengine/joint-vote/src/lib.rs

          BALANCES_IDX=$(grep -B1 'pub type Balances' "$RUNTIME_LIB" | grep -o 'pallet_index([0-9]*)' | grep -o '[0-9]*')
          DUOQIAN_IDX=$(grep -B1 'pub type DuoqianTransfer' "$RUNTIME_LIB" | grep -o 'pallet_index([0-9]*)' | grep -o '[0-9]*')
          VOTING_IDX=$(grep -B1 'pub type VotingEngine' "$RUNTIME_LIB" | grep -o 'pallet_index([0-9]*)' | grep -o '[0-9]*')

          sed -i "s/balancesPallet = [0-9]*/balancesPallet = $BALANCES_IDX/" "$REGISTRY"
          sed -i "s/duoqianTransferPallet = [0-9]*/duoqianTransferPallet = $DUOQIAN_IDX/" "$REGISTRY"
          sed -i "s/votingEnginePallet = [0-9]*/votingEnginePallet = $VOTING_IDX/" "$REGISTRY"

          PROPOSE_CALL=$(grep -B2 'fn propose_transfer' "$TRANSFER_PALLET" | grep -o 'call_index([0-9]*)' | grep -o '[0-9]*')
          # 联合投票内部投票阶段:JointVote::cast_admin
          JOINT_CALL=$(grep -B2 'fn cast_admin' "$JOINT_VOTE_PALLET" | grep -o 'call_index([0-9]*)' | grep -o '[0-9]*')
          # 联合公投阶段:JointVote::cast_referendum
          REFERENDUM_CALL=$(grep -B2 'fn cast_referendum' "$JOINT_VOTE_PALLET" | grep -o 'call_index([0-9]*)' | grep -o '[0-9]*')

          sed -i "s/proposeTransferCall = [0-9]*/proposeTransferCall = $PROPOSE_CALL/" "$REGISTRY"
          sed -i "s/jointVoteCall = [0-9]*/jointVoteCall = $JOINT_CALL/" "$REGISTRY"
          sed -i "s/castReferendumCall = [0-9]*/castReferendumCall = $REFERENDUM_CALL/" "$REGISTRY"

          echo "Balances=$BALANCES_IDX DuoqianTransfer=$DUOQIAN_IDX VotingEngine=$VOTING_IDX"
          echo "propose=$PROPOSE_CALL joint=$JOINT_CALL referendum=$REFERENDUM_CALL"

      - name: 安装依赖
        working-directory: citizenwallet
        run: flutter pub get

      - name: 恢复签名文件
        env:
          CITIZENWALLET_UPLOAD_KEYSTORE_BASE64: ${{ secrets.CITIZENWALLET_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          test -n "$CITIZENWALLET_UPLOAD_KEYSTORE_BASE64"
          printf '%s' "$CITIZENWALLET_UPLOAD_KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/citizenwallet/android/citizenwallet-ci.jks"

      - name: 生成 key.properties
        working-directory: citizenwallet/android
        env:
          CITIZENWALLET_KEYSTORE_PASSWORD: ${{ secrets.CITIZENWALLET_KEYSTORE_PASSWORD }}
          CITIZENWALLET_KEY_PASSWORD: ${{ secrets.CITIZENWALLET_KEY_PASSWORD }}
          CITIZENWALLET_KEY_ALIAS: ${{ secrets.CITIZENWALLET_KEY_ALIAS }}
        run: |
          test -n "$CITIZENWALLET_KEYSTORE_PASSWORD"
          test -n "$CITIZENWALLET_KEY_PASSWORD"
          test -n "$CITIZENWALLET_KEY_ALIAS"
          cat > key.properties <<EOF
          storePassword=$CITIZENWALLET_KEYSTORE_PASSWORD
          keyPassword=$CITIZENWALLET_KEY_PASSWORD
          keyAlias=$CITIZENWALLET_KEY_ALIAS
          storeFile=$GITHUB_WORKSPACE/citizenwallet/android/citizenwallet-ci.jks
          EOF

      - name: 分析代码
        working-directory: citizenwallet
        run: flutter analyze --no-fatal-infos

      - name: 运行测试
        working-directory: citizenwallet
        run: flutter test

      - name: 构建正式 APK
        working-directory: citizenwallet
        run: flutter build apk --release

      - name: 重命名产物
        run: |
          cp citizenwallet/build/app/outputs/flutter-apk/app-release.apk citizenwallet/build/app/outputs/flutter-apk/公民钱包.apk
          echo "产出: 公民钱包.apk"

      - name: 上传 公民钱包.apk
        if: ${{ github.event_name == 'workflow_dispatch' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: 公民钱包
          path: citizenwallet/build/app/outputs/flutter-apk/公民钱包.apk
          retention-days: 30
          overwrite: true
          if-no-files-found: error
