name: citizenchain-installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            sidecar_name: citizenchain-node-aarch64-apple-darwin
            plain_name: citizenchain-node
            bundles: app
          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_name: citizenchain-node-x86_64-pc-windows-msvc.exe
            plain_name: citizenchain-node.exe
            bundles: msi
          - platform: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar_name: citizenchain-node-x86_64-unknown-linux-gnu
            plain_name: citizenchain-node
            bundles: deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}, wasm32v1-none
          components: rust-src

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25.2.1"
          cache: npm
          cache-dependency-path: citizenchain/nodeui/frontend/package-lock.json

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            citizenchain -> target
            citizenchain/nodeui -> target

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install protobuf llvm
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"
          echo "LLVM_CONFIG_PATH=$(brew --prefix llvm)/bin/llvm-config" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          choco install protoc -y
          choco install llvm -y
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          echo "PROTOC=$(where.exe protoc | Select-Object -First 1)" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            llvm-dev \
            libclang-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            protobuf-compiler \
            libpam0g-dev

      - name: Configure libclang env (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          echo "LLVM_CONFIG_PATH=$(command -v llvm-config)" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"

      - name: Prepare bundled node binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          ./.github/scripts/prepare-nodeui-sidecar.sh "${{ matrix.target }}"

      - name: Build blockchain node binary (Windows)
        if: runner.os == 'Windows'
        run: cargo build --manifest-path citizenchain/node/Cargo.toml --release --target ${{ matrix.target }}

      - name: Prepare bundled node binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binDir = "citizenchain/nodeui/backend/binaries"
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null
          $src = "citizenchain/target/${{ matrix.target }}/release/node.exe"
          $side = "$binDir/${{ matrix.sidecar_name }}"
          $plain = "$binDir/${{ matrix.plain_name }}"
          Copy-Item $src $side -Force
          Copy-Item $src $plain -Force
          $hash = (Get-FileHash -Algorithm SHA256 $plain).Hash.ToLower()
          [System.IO.File]::WriteAllText("$binDir/citizenchain-node.sha256", $hash)

      - name: Install frontend dependencies
        run: npm --prefix citizenchain/nodeui/frontend ci

      - name: Build installer bundles (Unix)
        if: runner.os != 'Windows'
        run: npm --prefix citizenchain/nodeui/frontend run tauri:build -- --bundles ${{ matrix.bundles }}

      - name: Build installer bundles (Windows)
        if: runner.os == 'Windows'
        working-directory: citizenchain/nodeui
        shell: pwsh
        run: |
          # 验证 sidecar 二进制已就位
          $sidecar = "backend/binaries/${{ matrix.sidecar_name }}"
          if (-not (Test-Path $sidecar)) { throw "Sidecar binary not found: $sidecar" }
          # 从 nodeui/ 运行（Tauri 需要在子目录找到 tauri.conf.json）
          # 用 npx 调用 tauri CLI（绕过 npm pre 钩子中的 bash 脚本）
          npx --prefix frontend tauri build -c backend/tauri.conf.json --bundles ${{ matrix.bundles }}

      - name: Build DMG from .app (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          ./.github/scripts/create-macos-dmg.sh \
            "citizenchain/nodeui/target/release/bundle/macos/citizenchain.app" \
            "citizenchain/nodeui/target/release/bundle/dmg/citizenchain-${{ matrix.platform }}.dmg" \
            "citizenchain"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: citizenchain-${{ matrix.platform }}
          path: citizenchain/nodeui/**/bundle/**/*
          if-no-files-found: error

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/') && always() }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: citizenchain-*
          path: release-assets
          merge-multiple: true
          if-no-artifact-found: ignore

      - name: Collect installer packages for release
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-packages
          find release-assets -type f \( -name '*.deb' -o -name '*.dmg' -o -name '*.msi' \) -exec cp {} release-packages/ \;
          if find release-packages -type f | grep -q .; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release assets
        if: steps.assets.outputs.has_files == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: release-packages/*
          overwrite_files: true
