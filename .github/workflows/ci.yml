name: CI

# 什么时候触发：推代码到 main 分支，或者提交 PR 到 main 分支
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - "citizenchain/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - "citizenchain/**"

# 防止同一分支重复运行，新的推送会取消旧的运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 第 1 步：代码检查 ──
  check:
    name: 编译检查
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
          components: rust-src

      - name: 安装 LLVM/Clang 依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm llvm-dev clang libclang-dev protobuf-compiler

      - name: 配置 libclang 环境变量
        run: |
          echo "LLVM_CONFIG_PATH=$(command -v llvm-config)" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"

      - name: 缓存依赖（加速后续构建）
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "citizenchain"
          workspaces: |
            citizenchain -> target

      - name: 编译检查（不含 benchmark）
        working-directory: citizenchain
        run: cargo check --release

      - name: Clippy 基线检查（非阻断）
        working-directory: citizenchain
        continue-on-error: true
        run: cargo clippy --workspace --all-targets --all-features

  # ── 第 2 步：单元测试 ──
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: check # 编译通过后才跑测试
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
          components: rust-src

      - name: 安装 LLVM/Clang 依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm llvm-dev clang libclang-dev protobuf-compiler

      - name: 配置 libclang 环境变量
        run: |
          echo "LLVM_CONFIG_PATH=$(command -v llvm-config)" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"

      - name: 缓存依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "citizenchain"
          workspaces: |
            citizenchain -> target

      - name: 运行所有测试
        working-directory: citizenchain
        run: cargo test --release

  # ── 第 3 步：生产 WASM 安全检查 ──
  wasm-safety:
    name: WASM 安全检查
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
          components: rust-src

      - name: 安装 LLVM/Clang 依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm llvm-dev clang libclang-dev protobuf-compiler

      - name: 配置 libclang 环境变量
        run: |
          echo "LLVM_CONFIG_PATH=$(command -v llvm-config)" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"

      - name: 缓存依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "citizenchain"
          workspaces: |
            citizenchain -> target

      - name: 构建生产 WASM
        working-directory: citizenchain
        run: cargo build --release -p gmb-runtime

      - name: 检查 WASM 不含 benchmark feature
        working-directory: citizenchain
        run: |
          WASM_FILE=$(find target/release/wbuild -name "*.wasm" | head -1)
          if [ -z "$WASM_FILE" ]; then
            echo "⚠️  未找到 WASM 文件，跳过检查"
            exit 0
          fi
          echo "检查文件: $WASM_FILE"
          if strings "$WASM_FILE" | grep -qi "runtime.benchmarks"; then
            echo "❌ 失败：生产 WASM 包含 runtime-benchmarks feature！"
            echo "请确保生产构建不带 --features runtime-benchmarks"
            exit 1
          else
            echo "✅ 通过：生产 WASM 不含 benchmark feature"
          fi
