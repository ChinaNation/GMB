name: Benchmark Weights

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/benchmark-weights.yml"
      - "scripts/run-benchmarks.sh"
      - "citizenchain/runtime/**"
      - "citizenchain/governance/**"
      - "citizenchain/issuance/**"
      - "citizenchain/transaction/**"
      - "citizenchain/otherpallet/**"
      - "primitives/**"
      - "citizenchain/Cargo.toml"
      - "citizenchain/Cargo.lock"
      - "scripts/benchmark-weight-template.hbs"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  benchmark:
    if: github.actor != 'github-actions[bot]'
    name: 自动跑全部 benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
          components: rust-src

      - name: 安装 LLVM/Clang 依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm llvm-dev clang libclang-dev protobuf-compiler

      - name: 配置 libclang 环境变量
        run: |
          echo "LLVM_CONFIG_PATH=$(command -v llvm-config)" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"

      - name: 缓存依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "citizenchain-benchmarks"
          workspaces: |
            citizenchain -> target

      - name: 跑全部 benchmark 并写回权重文件
        run: ./scripts/run-benchmarks.sh --chain mainnet --steps 50 --repeat 20

      - name: 自动提交并推送 weights.rs 更新
        run: |
          set -euo pipefail

          mapfile -t WEIGHT_FILES < <(find citizenchain/governance citizenchain/issuance citizenchain/otherpallet citizenchain/transaction -path '*/src/weights.rs' | sort)

          changed=0
          for f in "${WEIGHT_FILES[@]}"; do
            if ! git diff --quiet -- "$f"; then
              changed=1
              break
            fi
          done

          if [[ "$changed" -eq 0 ]]; then
            echo "weights.rs 无变化，跳过提交。"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${WEIGHT_FILES[@]}"

          git commit -m "chore(weights): auto-update benchmark outputs"
          git push origin "HEAD:${GITHUB_REF_NAME}"
