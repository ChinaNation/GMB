name: CitizenChain Node CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/citizenchain-node.yml"
      - "citizenchain/node/**"
      - "citizenchain/runtime/primitives/**"
      - "citizenchain/runtime/src/**"
      - "citizenchain/runtime/Cargo.toml"
      - "citizenchain/Cargo.toml"
      - "citizenchain/Cargo.lock"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/citizenchain-node.yml"
      - "citizenchain/node/**"
      - "citizenchain/runtime/primitives/**"
      - "citizenchain/runtime/src/**"
      - "citizenchain/runtime/Cargo.toml"
      - "citizenchain/Cargo.toml"
      - "citizenchain/Cargo.lock"
  workflow_dispatch:

concurrency:
  group: citizenchain-node-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  node:
    name: node 编译与测试
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
          components: rust-src

      - name: 安装 LLVM/Clang 依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm llvm-dev clang libclang-dev protobuf-compiler

      - name: 配置 libclang 环境变量
        run: |
          echo "LLVM_CONFIG_PATH=$(command -v llvm-config)" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"

      - name: 缓存依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "citizenchain-node"
          workspaces: |
            citizenchain -> target

      - name: 编译 node
        working-directory: citizenchain
        run: cargo check --release -p node

      - name: 运行 node 测试
        working-directory: citizenchain
        run: cargo test --release -p node

      - name: 编译 node 二进制
        working-directory: citizenchain
        run: cargo build --release -p node

      - name: 上传 node 二进制
        uses: actions/upload-artifact@v4
        with:
          name: citizenchain-node-linux-amd64
          path: citizenchain/target/release/node
          retention-days: 30
