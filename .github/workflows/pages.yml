name: Deploy GMB README Page

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static page artifact
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p site
          cp README.web.html site/GMB_README.html

          python3 - <<'PY'
          import os
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          raw_url = f"https://raw.githubusercontent.com/{repo}/main/README.md"
          page = Path("site/GMB_README.html")
          text = page.read_text(encoding="utf-8")
          text = text.replace(
              'const readmePath = "./README.md";',
              f'const readmePath = "{raw_url}";'
          )
          page.write_text(text, encoding="utf-8")
          PY

          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="zh-CN">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=./GMB_README.html">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>Redirecting...</title>
            <script>
              window.location.replace('./GMB_README.html');
            </script>
          </head>
          <body>
            <p>Redirecting to <a href="./GMB_README.html">GMB_README.html</a> ...</p>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
