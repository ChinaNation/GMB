name: CPMS CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/cpms-ci.yml"
      - "cpms/**"
      # 中文注释：CPMS 安装包随附 SFID 维护的行政区唯一源，数据变更时一并重验。
      - "sfid/backend/china/data/china.sqlite"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/cpms-ci.yml"
      - "cpms/**"
      # 中文注释：CPMS 安装包随附 SFID 维护的行政区唯一源，数据变更时一并重验。
      - "sfid/backend/china/data/china.sqlite"
  workflow_dispatch:

concurrency:
  group: cpms-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: CPMS ${{ matrix.arch }} 编译与测试
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Node.js
        # 固定使用 Node.js 24,与项目 package.json engines 和 GitHub Actions node24 运行时一致。
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cpms/frontend/package-lock.json

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "cpms-backend-${{ matrix.arch }}"
          workspaces: cpms/backend -> target

      # ── 后端 ──
      - name: 编译后端
        working-directory: cpms/backend
        run: cargo build --release

      - name: 运行后端测试
        working-directory: cpms/backend
        run: cargo test

      # ── 前端 ──
      - name: 安装前端依赖
        working-directory: cpms/frontend
        run: npm ci

      - name: 构建前端
        working-directory: cpms/frontend
        run: npm run build

      # ── 手动运行才构建正式离线安装包；push / pull_request 只做 CI 校验 ──
      - name: 构建 cpms-ubuntu24-${{ matrix.arch }}.run
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: bash cpms/scripts/build_linux_host_installer.sh --arch "${{ matrix.arch }}"

      - name: 上传 cpms-ubuntu24-${{ matrix.arch }}.run
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: cpms-ubuntu24-${{ matrix.arch }}
          path: |
            cpms/dist/cpms-ubuntu24-${{ matrix.arch }}.run
            cpms/dist/cpms-ubuntu24-${{ matrix.arch }}.run.sha256
            cpms/docs/CPMS安装配置手册.pdf
          retention-days: 30
