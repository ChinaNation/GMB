name: CPMS CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/cpms-ci.yml"
      - "cpms/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/cpms-ci.yml"
      - "cpms/**"
  workflow_dispatch:

concurrency:
  group: cpms-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: CPMS 编译、测试与打包
    runs-on: ubuntu-24.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Node.js
        # 固定使用 Node.js 24,与项目 package.json engines 和 GitHub Actions node24 运行时一致。
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cpms/frontend/package-lock.json

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "cpms-backend"
          workspaces: cpms/backend -> target

      # ── 后端 ──
      - name: 编译后端
        working-directory: cpms/backend
        run: cargo build --release

      - name: 运行后端测试
        working-directory: cpms/backend
        run: cargo test

      # ── 前端 ──
      - name: 安装前端依赖
        working-directory: cpms/frontend
        run: npm ci

      - name: 构建前端
        working-directory: cpms/frontend
        run: npm run build

      # ── 构建 Ubuntu 24.04 离线一体安装包 ──
      - name: 构建 cpms-ubuntu24-amd64.run
        run: bash cpms/scripts/build_linux_host_installer.sh

      - name: 清理旧 artifact
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '.artifacts[] | select(.name == "CPMS") | .id' \
          | while read -r id; do
              gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id || true
            done

      - name: 上传 cpms-ubuntu24-amd64.run
        if: ${{ github.event_name == 'workflow_dispatch' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: CPMS
          path: cpms/dist/cpms-ubuntu24-amd64.run
          retention-days: 30
