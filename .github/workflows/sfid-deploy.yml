name: SFID Deploy

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sfid-deploy.yml"
      - "sfid/**"
  workflow_dispatch:

concurrency:
  group: sfid-deploy
  cancel-in-progress: true

permissions:
  contents: read

env:
  DEPLOY_HOST: ${{ vars.SFID_DEPLOY_HOST || '147.224.14.117' }}
  DEPLOY_DOMAIN: ${{ vars.SFID_DEPLOY_DOMAIN || 'sfid.wuminapp.com' }}
  DEPLOY_PORT: ${{ vars.SFID_DEPLOY_PORT || '22' }}
  APP_HOME: ${{ vars.SFID_DEPLOY_APP_HOME || '/opt/sfid' }}
  FRONTEND_ROOT: ${{ vars.SFID_DEPLOY_FRONTEND_ROOT || '/var/www/sfid' }}
  SERVICE_NAME: ${{ vars.SFID_DEPLOY_SERVICE || 'sfid-backend' }}
  ENV_FILE: ${{ vars.SFID_DEPLOY_ENV_FILE || '/etc/sfid/sfid.env' }}
  WEB_SERVICE_NAME: ${{ vars.SFID_DEPLOY_WEB_SERVICE || 'nginx' }}
  HEALTHCHECK_URL: ${{ vars.SFID_DEPLOY_HEALTHCHECK_URL || 'http://127.0.0.1:8899/api/v1/health' }}
  VITE_SFID_API_BASE_URL: ${{ vars.SFID_FRONTEND_API_BASE_URL || '/api' }}

jobs:
  deploy:
    name: Build And Deploy SFID
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            sfid/backend -> target

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sfid/frontend/package-lock.json

      - name: Install Backend Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config

      - name: Test Backend
        working-directory: sfid/backend
        run: cargo test --locked

      - name: Build Backend Release
        working-directory: sfid/backend
        run: cargo build --release --locked

      - name: Build Frontend
        working-directory: sfid/frontend
        env:
          VITE_SFID_API_BASE_URL: ${{ env.VITE_SFID_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Prepare Release Bundle
        run: |
          RELEASE_DIR="/tmp/sfid-release"
          rm -rf "${RELEASE_DIR}"
          mkdir -p \
            "${RELEASE_DIR}/backend/db/migrations" \
            "${RELEASE_DIR}/frontend" \
            "${RELEASE_DIR}/deploy"

          install -m 755 \
            "sfid/backend/target/release/sfid-backend" \
            "${RELEASE_DIR}/backend/sfid-backend"
          cp -f sfid/backend/db/migrations/*.sql "${RELEASE_DIR}/backend/db/migrations/"
          cp -R sfid/frontend/dist "${RELEASE_DIR}/frontend/dist"
          install -m 755 \
            "sfid/deploy/prod/scripts/apply_sfid_migrations.sh" \
            "${RELEASE_DIR}/deploy/apply_sfid_migrations.sh"
          install -m 755 \
            "sfid/deploy/prod/scripts/update_sfid_app.sh" \
            "${RELEASE_DIR}/deploy/update_sfid_app.sh"

          tar -C "${RELEASE_DIR}" -czf "/tmp/sfid-release-${GITHUB_SHA}.tar.gz" .

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SFID_DEPLOY_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SFID_DEPLOY_KNOWN_HOSTS }}
        run: |
          if [[ -z "${SSH_PRIVATE_KEY}" ]]; then
            echo "缺少 GitHub Secret: SFID_DEPLOY_SSH_KEY"
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if [[ -n "${SSH_KNOWN_HOSTS}" ]]; then
            printf '%s\n' "${SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Upload Release Bundle
        env:
          DEPLOY_USER: ${{ secrets.SFID_DEPLOY_USER }}
        run: |
          if [[ -z "${DEPLOY_USER}" ]]; then
            echo "缺少 GitHub Secret: SFID_DEPLOY_USER"
            exit 1
          fi

          REMOTE_DIR="/tmp/sfid-release-${GITHUB_SHA}"
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "rm -rf '${REMOTE_DIR}' && mkdir -p '${REMOTE_DIR}'"
          scp -P "${DEPLOY_PORT}" \
            "/tmp/sfid-release-${GITHUB_SHA}.tar.gz" \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${REMOTE_DIR}/release.tar.gz"
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "tar -xzf '${REMOTE_DIR}/release.tar.gz' -C '${REMOTE_DIR}'"

      - name: Deploy On Server
        env:
          DEPLOY_USER: ${{ secrets.SFID_DEPLOY_USER }}
        run: |
          REMOTE_DIR="/tmp/sfid-release-${GITHUB_SHA}"
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "
            sudo APP_HOME='${APP_HOME}' \
              FRONTEND_ROOT='${FRONTEND_ROOT}' \
              SERVICE_NAME='${SERVICE_NAME}' \
              ENV_FILE='${ENV_FILE}' \
              WEB_SERVICE_NAME='${WEB_SERVICE_NAME}' \
              HEALTHCHECK_URL='${HEALTHCHECK_URL}' \
              bash '${REMOTE_DIR}/deploy/update_sfid_app.sh' '${GITHUB_SHA}' '${REMOTE_DIR}'
          "

      - name: Cleanup Remote Temp Files
        if: always()
        env:
          DEPLOY_USER: ${{ secrets.SFID_DEPLOY_USER }}
        run: |
          REMOTE_DIR="/tmp/sfid-release-${GITHUB_SHA}"
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "rm -rf '${REMOTE_DIR}'" || true
