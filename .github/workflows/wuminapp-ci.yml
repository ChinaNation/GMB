name: WuMinApp CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/wuminapp-ci.yml"
      - "wuminapp/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/wuminapp-ci.yml"
      - "wuminapp/**"
  workflow_dispatch:

concurrency:
  group: wuminapp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile:
    name: wuminapp Flutter 检查
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: 安装依赖
        working-directory: wuminapp
        run: flutter pub get

      - name: 分析代码
        working-directory: wuminapp
        run: flutter analyze

      - name: 运行测试
        working-directory: wuminapp
        run: flutter test
