name: WuMinApp CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/wuminapp-ci.yml"
      - "wuminapp/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/wuminapp-ci.yml"
      - "wuminapp/**"
  workflow_dispatch:

concurrency:
  group: wuminapp-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 代码检查 ──
  check:
    name: Flutter 代码检查
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 校验 chainspec.json 冻结
        run: bash scripts/check-chainspec-frozen.sh

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: 安装依赖
        working-directory: wuminapp
        run: flutter pub get

      - name: 分析代码
        working-directory: wuminapp
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: 运行测试
        working-directory: wuminapp
        # WalletIsar 测试模式磁盘 dir 在 systemTemp.path,实例名固定 'wuminapp_wallet'。
        # 默认 concurrency=CPU 核数,多个 isolate 并行打开同一磁盘 db 会
        # 互踩 unique index 触发 IsarError,顺序跑稳。
        run: flutter test --concurrency=1

  # ── Android APK 打包 ──
  android:
    name: 打包公民.apk
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Android SDK Platform 36
        run: sdkmanager "platforms;android-36"

      # chainspec.json 已在创世时冻结，绝不从其他地方下载覆盖。
      # runtime 升级走链上 system.setCode，不要重新 build-spec。
      # 详见 memory/07-ai/chainspec-frozen.md
      - name: 再次校验 chainspec.json 冻结
        run: bash scripts/check-chainspec-frozen.sh

      # 编译 smoldot Rust FFI 库（Android arm64-v8a + armeabi-v7a）
      - name: 编译 smoldot native library (Android ARM)
        working-directory: wuminapp
        run: ./scripts/build-smoldot-native.sh android

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "wuminapp-rust-android"
          workspaces: wuminapp/rust -> target

      - name: 安装 Flutter 依赖
        working-directory: wuminapp
        run: flutter pub get

      - name: 修复 isar_flutter_libs compileSdk
        run: |
          ISAR_GRADLE=$(find "$HOME/.pub-cache" -path "*/isar_flutter_libs*/android/build.gradle" | head -1)
          if [ -n "$ISAR_GRADLE" ]; then
            sed -i 's/compileSdkVersion 30/compileSdkVersion 36/' "$ISAR_GRADLE"
            echo "已将 isar_flutter_libs compileSdkVersion 30 → 36"
          fi

      # push / PR 只验证 Android 工程能构建，不读取正式签名密钥。
      # 只有 GitHub 页面手动 Run workflow 才生成可分发的正式签名 APK。
      - name: 写入 Android release keystore
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          WUMINAPP_RELEASE_KEYSTORE_BASE64: ${{ secrets.WUMINAPP_RELEASE_KEYSTORE_BASE64 }}
          WUMINAPP_ANDROID_STORE_PASSWORD: ${{ secrets.WUMINAPP_ANDROID_STORE_PASSWORD }}
          WUMINAPP_ANDROID_KEY_ALIAS: ${{ secrets.WUMINAPP_ANDROID_KEY_ALIAS }}
          WUMINAPP_ANDROID_KEY_PASSWORD: ${{ secrets.WUMINAPP_ANDROID_KEY_PASSWORD }}
          WUMINAPP_RELEASE_KEYSTORE_SHA256: ${{ secrets.WUMINAPP_RELEASE_KEYSTORE_SHA256 }}
        run: |
          set -euo pipefail

          for name in WUMINAPP_RELEASE_KEYSTORE_BASE64 WUMINAPP_ANDROID_STORE_PASSWORD WUMINAPP_ANDROID_KEY_ALIAS WUMINAPP_ANDROID_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error::手动发布缺少 $name secret。"
              exit 1
            fi
          done

          keystore_path="$RUNNER_TEMP/wuminapp-release.jks"
          printf '%s' "$WUMINAPP_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"

          if [ -n "${WUMINAPP_RELEASE_KEYSTORE_SHA256:-}" ]; then
            actual_sha="$(shasum -a 256 "$keystore_path" | awk '{print $1}')"
            if [ "$actual_sha" != "$WUMINAPP_RELEASE_KEYSTORE_SHA256" ]; then
              echo "::error::wuminapp release keystore SHA256 mismatch."
              exit 1
            fi
          fi

          echo "WUMINAPP_ANDROID_STORE_FILE=$keystore_path" >> "$GITHUB_ENV"
          echo "WUMINAPP_ANDROID_STORE_PASSWORD=$WUMINAPP_ANDROID_STORE_PASSWORD" >> "$GITHUB_ENV"
          echo "WUMINAPP_ANDROID_KEY_ALIAS=$WUMINAPP_ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "WUMINAPP_ANDROID_KEY_PASSWORD=$WUMINAPP_ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: 打包 Debug APK（push / PR 检查）
        if: ${{ github.event_name != 'workflow_dispatch' }}
        working-directory: wuminapp
        run: flutter build apk --debug --target-platform android-arm,android-arm64

      - name: 打包正式签名 APK
        if: ${{ github.event_name == 'workflow_dispatch' }}
        working-directory: wuminapp
        run: flutter build apk --release --target-platform android-arm,android-arm64

      - name: 重命名为公民.apk
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: cp wuminapp/build/app/outputs/flutter-apk/app-release.apk wuminapp/build/app/outputs/flutter-apk/公民.apk

      - name: 生成 Android 更新清单
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -euo pipefail

          version_line="$(awk '/^version:/ {print $2; exit}' wuminapp/pubspec.yaml)"
          version_name="${version_line%%+*}"
          version_code="${version_line##*+}"
          apk_path="wuminapp/build/app/outputs/flutter-apk/公民.apk"
          apk_sha256="$(shasum -a 256 "$apk_path" | awk '{print $1}')"
          published_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          release_tag="wuminapp-android-v${version_name}-${version_code}"
          manifest_path="wuminapp/build/app/outputs/flutter-apk/wuminapp-android-update.json"

          cat > "$manifest_path" <<EOF
          {
            "app": "wuminapp",
            "platform": "android",
            "package_name": "org.chinanation.citizen",
            "version_name": "$version_name",
            "version_code": $version_code,
            "apk_asset": "公民.apk",
            "apk_sha256": "$apk_sha256",
            "published_at": "$published_at",
            "notes": "wuminapp Android $version_name+$version_code"
          }
          EOF

          echo "WUMINAPP_ANDROID_RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"

      - name: 发布 GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          apk_path="wuminapp/build/app/outputs/flutter-apk/公民.apk"
          manifest_path="wuminapp/build/app/outputs/flutter-apk/wuminapp-android-update.json"
          release_title="wuminapp Android ${WUMINAPP_ANDROID_RELEASE_TAG#wuminapp-android-v}"

          if gh release view "$WUMINAPP_ANDROID_RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$WUMINAPP_ANDROID_RELEASE_TAG" \
              --title "$release_title" \
              --notes-file "$manifest_path" \
              --latest=false
          else
            gh release create "$WUMINAPP_ANDROID_RELEASE_TAG" \
              --title "$release_title" \
              --notes-file "$manifest_path" \
              --latest=false
          fi

          gh release upload "$WUMINAPP_ANDROID_RELEASE_TAG" \
            "$apk_path" \
            "$manifest_path" \
            --clobber

      # 只有 GitHub 页面手动运行时才维护 APK 产物。
      - name: 清理旧版 APK artifact
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '.artifacts[] | select(.name == "公民.apk") | .id' \
          | while read -r id; do
              echo "删除旧 artifact: $id"
              gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id || true
            done

      - name: 上传公民.apk
        if: ${{ github.event_name == 'workflow_dispatch' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: 公民.apk
          path: wuminapp/build/app/outputs/flutter-apk/公民.apk
          retention-days: 30

      - name: 上传 Android 更新清单
        if: ${{ github.event_name == 'workflow_dispatch' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: wuminapp-android-update.json
          path: wuminapp/build/app/outputs/flutter-apk/wuminapp-android-update.json
          retention-days: 30
