name: WuMinApp CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/wuminapp-ci.yml"
      - "wuminapp/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/wuminapp-ci.yml"
      - "wuminapp/**"
  workflow_dispatch:

concurrency:
  group: wuminapp-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 代码检查 ──
  check:
    name: Flutter 代码检查
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: 安装依赖
        working-directory: wuminapp
        run: flutter pub get

      - name: 分析代码
        working-directory: wuminapp
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: 运行测试
        working-directory: wuminapp
        run: flutter test

  # ── Android APK 打包 ──
  android:
    name: 打包公民.apk
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: aarch64-linux-android

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Android SDK Platform 36
        run: sdkmanager "platforms;android-36"

      # 下载最新 chainspec.json（由 Linux CI 导出）
      - name: 下载最新 chainspec.json
        run: gh run download --name citizenchain-chainspec --dir chainspec-artifact -R ${{ github.repository }} || echo "未找到 chainspec artifact，使用仓库内现有版本"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 替换 chainspec.json
        run: |
          if [ -f chainspec-artifact/chainspec.json ]; then
            cp chainspec-artifact/chainspec.json wuminapp/assets/chainspec.json
            echo "已更新为最新 chainspec.json"
          else
            echo "使用仓库内现有 chainspec.json"
          fi

      # 编译 smoldot Rust FFI 库（Android arm64）
      - name: 编译 smoldot native library (Android arm64)
        working-directory: wuminapp/rust
        run: |
          # 配置 Android NDK 交叉编译环境
          NDK_HOME="${ANDROID_NDK_HOME:-$ANDROID_HOME/ndk/$(ls $ANDROID_HOME/ndk/ | sort -V | tail -1)}"
          TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          echo "使用 NDK: $NDK_HOME"

          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$TOOLCHAIN/bin/aarch64-linux-android24-clang"
          export CC_aarch64_linux_android="$TOOLCHAIN/bin/aarch64-linux-android24-clang"
          export AR_aarch64_linux_android="$TOOLCHAIN/bin/llvm-ar"

          cargo build --release --target aarch64-linux-android

          # 放到 Flutter 自动打包位置
          DEST="../android/app/src/main/jniLibs/arm64-v8a"
          mkdir -p "$DEST"
          cp target/aarch64-linux-android/release/libsmoldot.so "$DEST/"
          echo "libsmoldot.so: $(wc -c < "$DEST/libsmoldot.so" | tr -d ' ') bytes"

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "wuminapp-rust-android"
          workspaces: wuminapp/rust -> target

      - name: 安装 Flutter 依赖
        working-directory: wuminapp
        run: flutter pub get

      - name: 打包 APK
        working-directory: wuminapp
        run: flutter build apk --release

      - name: 重命名为公民.apk
        run: cp wuminapp/build/app/outputs/flutter-apk/app-release.apk wuminapp/build/app/outputs/flutter-apk/公民.apk

      # 清理旧版 APK artifact 后上传新版
      - name: 清理旧版 APK artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '.artifacts[] | select(.name == "公民.apk") | .id' \
          | while read -r id; do
              echo "删除旧 artifact: $id"
              gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id || true
            done

      - name: 上传公民.apk
        uses: actions/upload-artifact@v4
        with:
          name: 公民.apk
          path: wuminapp/build/app/outputs/flutter-apk/公民.apk
          retention-days: 30
