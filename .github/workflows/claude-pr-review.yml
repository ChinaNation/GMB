name: Claude PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    name: Claude 自动审查
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 未配置 API Key 时跳过
        if: env.ANTHROPIC_API_KEY == ''
        run: echo "未配置 ANTHROPIC_API_KEY，跳过 Claude 自动审查。"

      - name: Claude 审查 PR
        if: env.ANTHROPIC_API_KEY != ''
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review this pull request for bugs, regressions, security risks, missing tests, and maintainability issues.
            Reply in Chinese.
            Follow the repository root CLAUDE.md.
            Also check whether:
            1. critical logic has necessary Chinese comments,
            2. memory/ or technical docs were updated when code changed,
            3. debug leftovers or TODO/FIXME markers remain.
          claude_args: |
            --max-turns 10
            --append-system-prompt "必须优先报告高风险问题，不要猜测不清楚的业务逻辑。"
