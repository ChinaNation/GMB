name: SFID CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/sfid-ci.yml"
      - "sfid/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/sfid-ci.yml"
      - "sfid/**"
  workflow_dispatch:

concurrency:
  group: sfid-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: SFID 编译、测试与打包
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sfid/frontend/package-lock.json

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "sfid-backend"
          workspaces: sfid/backend -> target

      - name: 安装系统依赖
        run: sudo apt-get update && sudo apt-get install -y pkg-config

      # ── 后端 ──
      - name: 编译后端
        working-directory: sfid/backend
        run: cargo build --release --locked

      - name: 运行后端测试
        working-directory: sfid/backend
        run: cargo test --locked

      # ── 前端 ──
      - name: 安装前端依赖
        working-directory: sfid/frontend
        run: npm ci

      - name: 构建前端
        working-directory: sfid/frontend
        run: npm run build

      # ── 构建 .deb 安装包 ──
      - name: 构建 SFID.deb
        run: |
          DEB_ROOT="deb-pkg"
          mkdir -p "$DEB_ROOT/DEBIAN"
          mkdir -p "$DEB_ROOT/opt/sfid/bin"
          mkdir -p "$DEB_ROOT/opt/sfid/frontend"
          mkdir -p "$DEB_ROOT/etc/systemd/system"
          mkdir -p "$DEB_ROOT/etc/nginx/sites-available"

          # 后端二进制
          cp sfid/backend/target/release/sfid-backend "$DEB_ROOT/opt/sfid/bin/"
          chmod 755 "$DEB_ROOT/opt/sfid/bin/sfid-backend"

          # 前端静态文件
          cp -r sfid/frontend/dist/* "$DEB_ROOT/opt/sfid/frontend/"

          # deb 控制文件
          cat > "$DEB_ROOT/DEBIAN/control" << 'EOF'
          Package: sfid
          Version: 1.0.0
          Section: web
          Priority: optional
          Architecture: amd64
          Depends: postgresql, redis-server, nginx
          Maintainer: GMB <noreply@gmb.org>
          Description: SFID 系统
           公民身份识别码系统服务端，包含后端 API 和前端静态文件。
          EOF

          # 安装后脚本
          cat > "$DEB_ROOT/DEBIAN/postinst" << 'POSTINST'
          #!/bin/bash
          set -e
          # 创建用户
          if ! id -u sfid >/dev/null 2>&1; then
            useradd --system --no-create-home --shell /usr/sbin/nologin sfid
          fi
          # 环境变量模板
          if [ ! -f /opt/sfid/.env ]; then
            cat > /opt/sfid/.env << 'ENVEOF'
          SFID_ENV=production
          DATABASE_URL=postgres://sfid:sfid_pwd@127.0.0.1:5432/sfid
          SFID_REDIS_URL=redis://127.0.0.1:6379/0
          SFID_SIGNING_SEED_HEX=<替换为主签名种子>
          SFID_CHAIN_WS_URL=ws://127.0.0.1:9944
          SFID_BIND_ADDR=127.0.0.1:8899
          SFID_CHAIN_TOKEN=<替换为链路鉴权 token>
          SFID_CHAIN_SIGNING_SECRET=<替换为签名密钥>
          SFID_PUBLIC_SEARCH_TOKEN=<替换为公共搜索 token>
          ENVEOF
            echo "请编辑 /opt/sfid/.env 配置环境变量"
          fi
          chown -R sfid:sfid /opt/sfid
          systemctl daemon-reload
          systemctl enable sfid-server
          echo "SFID 安装完成。启动: sudo systemctl start sfid-server"
          POSTINST
          chmod 755 "$DEB_ROOT/DEBIAN/postinst"

          # systemd 服务
          cat > "$DEB_ROOT/etc/systemd/system/sfid-server.service" << 'EOF'
          [Unit]
          Description=SFID Server
          After=network.target postgresql.service redis.service

          [Service]
          Type=simple
          User=sfid
          WorkingDirectory=/opt/sfid
          EnvironmentFile=/opt/sfid/.env
          ExecStart=/opt/sfid/bin/sfid-backend
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

          # nginx 配置
          cat > "$DEB_ROOT/etc/nginx/sites-available/sfid" << 'EOF'
          server {
              listen 443 ssl;
              server_name sfid.example.com;
              ssl_certificate     /etc/ssl/sfid/cert.pem;
              ssl_certificate_key /etc/ssl/sfid/key.pem;
              root /opt/sfid/frontend;
              index index.html;
              location / {
                  try_files $uri $uri/ /index.html;
              }
              location /api/ {
                  proxy_pass http://127.0.0.1:8899;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
          EOF

          # 构建 deb
          dpkg-deb --build "$DEB_ROOT" SFID.deb
          echo "产出: SFID.deb ($(du -h SFID.deb | cut -f1))"

      - name: 清理旧 artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '.artifacts[] | select(.name == "SFID") | .id' \
          | while read -r id; do
              gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id || true
            done

      - name: 上传 SFID.deb
        uses: actions/upload-artifact@v4
        with:
          name: SFID
          path: SFID.deb
          retention-days: 30
