name: SFID CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/sfid-ci.yml"
      - "sfid/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/sfid-ci.yml"
      - "sfid/**"
  workflow_dispatch:

concurrency:
  group: sfid-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: SFID 编译、测试与打包
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sfid/frontend/package-lock.json

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "sfid-backend"
          workspaces: sfid/backend -> target

      - name: 安装系统依赖
        run: sudo apt-get update && sudo apt-get install -y pkg-config

      # ── 后端 ──
      - name: 编译后端
        working-directory: sfid/backend
        run: cargo build --release --locked

      - name: 运行后端测试
        working-directory: sfid/backend
        run: cargo test --locked

      # ── 前端 ──
      - name: 安装前端依赖
        working-directory: sfid/frontend
        run: npm ci

      - name: 构建前端
        working-directory: sfid/frontend
        run: npm run build

      # ── 打包 Linux 安装包 ──
      - name: 组装安装包
        run: |
          PKG_DIR="sfid-server"
          mkdir -p "$PKG_DIR/bin"
          mkdir -p "$PKG_DIR/frontend"

          # 后端二进制
          cp sfid/backend/target/release/sfid-backend "$PKG_DIR/bin/"

          # 前端静态文件
          cp -r sfid/frontend/dist/* "$PKG_DIR/frontend/"

          # systemd 服务文件
          cat > "$PKG_DIR/sfid-server.service" << 'EOF'
          [Unit]
          Description=SFID Server
          After=network.target postgresql.service redis.service

          [Service]
          Type=simple
          User=sfid
          WorkingDirectory=/opt/sfid
          EnvironmentFile=/opt/sfid/.env
          ExecStart=/opt/sfid/bin/sfid-backend
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

          # nginx 配置（前端静态 + 后端 API 代理）
          cat > "$PKG_DIR/sfid-nginx.conf" << 'EOF'
          server {
              listen 443 ssl;
              server_name sfid.example.com;

              # TLS 证书（部署时替换）
              ssl_certificate     /etc/ssl/sfid/cert.pem;
              ssl_certificate_key /etc/ssl/sfid/key.pem;

              # 前端静态文件
              root /opt/sfid/frontend;
              index index.html;

              location / {
                  try_files $uri $uri/ /index.html;
              }

              # 后端 API 代理
              location /api/ {
                  proxy_pass http://127.0.0.1:8899;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
          EOF

          # 环境变量模板
          cat > "$PKG_DIR/.env.template" << 'EOF'
          SFID_ENV=production
          DATABASE_URL=postgres://sfid:sfid_pwd@127.0.0.1:5432/sfid
          SFID_REDIS_URL=redis://127.0.0.1:6379/0
          SFID_SIGNING_SEED_HEX=<替换为主签名种子>
          SFID_CHAIN_WS_URL=ws://127.0.0.1:9944
          SFID_BIND_ADDR=127.0.0.1:8899
          SFID_CHAIN_TOKEN=<替换为链路鉴权 token>
          SFID_CHAIN_SIGNING_SECRET=<替换为签名密钥>
          SFID_PUBLIC_SEARCH_TOKEN=<替换为公共搜索 token>
          EOF

          # 安装脚本
          cat > "$PKG_DIR/install.sh" << 'INSTALL'
          #!/usr/bin/env bash
          set -euo pipefail
          INSTALL_DIR="/opt/sfid"
          echo "==> 安装 SFID 系统到 $INSTALL_DIR"
          sudo mkdir -p "$INSTALL_DIR"
          sudo cp -r bin frontend "$INSTALL_DIR/"
          sudo cp sfid-server.service /etc/systemd/system/
          if [ ! -f "$INSTALL_DIR/.env" ]; then
            sudo cp .env.template "$INSTALL_DIR/.env"
            echo "    请编辑 $INSTALL_DIR/.env 配置环境变量"
          fi
          sudo systemctl daemon-reload
          sudo systemctl enable sfid-server
          echo "==> 安装完成。启动: sudo systemctl start sfid-server"
          INSTALL
          chmod +x "$PKG_DIR/install.sh"

          # 打包
          tar czf sfid-server-linux-amd64.tar.gz "$PKG_DIR"
          echo "安装包大小: $(du -h sfid-server-linux-amd64.tar.gz | cut -f1)"

      - name: 清理旧 artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '.artifacts[] | select(.name == "sfid-server") | .id' \
          | while read -r id; do
              gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id || true
            done

      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: sfid-server
          path: sfid-server-linux-amd64.tar.gz
          retention-days: 30
