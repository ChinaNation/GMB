name: SFID CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/sfid-ci.yml"
      - "sfid/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/sfid-ci.yml"
      - "sfid/**"
  workflow_dispatch:

concurrency:
  group: sfid-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: sfid 后端编译与测试
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "sfid-backend"
          workspaces: |
            sfid/backend -> target

      - name: 安装后端构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config

      - name: 编译后端
        working-directory: sfid/backend
        run: cargo check --locked

      - name: 运行后端测试
        working-directory: sfid/backend
        run: cargo test --locked

  frontend:
    name: sfid 前端构建
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sfid/frontend/package-lock.json

      - name: 安装前端依赖
        working-directory: sfid/frontend
        run: npm ci

      - name: 构建前端
        working-directory: sfid/frontend
        run: npm run build
