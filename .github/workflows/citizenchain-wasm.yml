name: CitizenChain WASM

on:
  # 中文注释：公民控制台按钮会先在源码中把 spec_version 提高 1，再带目标链版本触发；
  # 其它手动触发不提高版本。无论入口为何，本 workflow 都只按提交源码原样编译。
  workflow_dispatch:
    inputs:
      runtime_upgrade:
        description: '是否由公民控制台发起 Runtime 升级构建'
        required: true
        type: boolean
        default: false
      chain_spec_version:
        description: '升级前目标链 spec_version（仅升级构建填写）'
        required: false
        type: string
      chain_genesis_hash:
        description: '升级目标链 genesis hash（仅升级构建填写）'
        required: false
        type: string

concurrency:
  group: citizenchain-wasm-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-wasm:
    name: 编译 WASM
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 校验源码版本与构建用途
        env:
          RUNTIME_UPGRADE: ${{ inputs.runtime_upgrade }}
          CHAIN_SPEC_VERSION: ${{ inputs.chain_spec_version }}
          CHAIN_GENESIS_HASH: ${{ inputs.chain_genesis_hash }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          runtime_path = Path("citizenchain/runtime/src/lib.rs")
          text = runtime_path.read_text(encoding="utf-8")
          matches = re.findall(r"(?m)^\s*spec_version:\s*(\d+)\s*,\s*$", text)
          if len(matches) != 1:
              raise SystemExit("runtime/src/lib.rs 必须且只能包含一个 spec_version 字段")
          source_version = int(matches[0])
          is_upgrade = os.environ.get("RUNTIME_UPGRADE", "false").lower() == "true"
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])

          if is_upgrade:
              chain_text = os.environ.get("CHAIN_SPEC_VERSION", "")
              genesis_hash = os.environ.get("CHAIN_GENESIS_HASH", "").lower()
              if not re.fullmatch(r"\d+", chain_text):
                  raise SystemExit("Runtime 升级构建缺少有效的目标链 spec_version")
              if not re.fullmatch(r"0x[0-9a-f]{64}", genesis_hash):
                  raise SystemExit("Runtime 升级构建缺少有效的目标链 genesis hash")
              chain_version = int(chain_text)
              if source_version != chain_version + 1:
                  raise SystemExit(
                      f"源码 spec_version={source_version}，但目标链 spec_version={chain_version}；"
                      "升级构建必须严格等于目标链版本 + 1"
                  )
              purpose = "公民控制台 Runtime 升级构建"
              details = (
                  f"- 目标链 genesis hash：`{genesis_hash}`\n"
                  f"- 升级前 spec_version：`{chain_version}`\n"
                  f"- 本次源码 spec_version：`{source_version}`\n"
              )
          else:
              if os.environ.get("CHAIN_SPEC_VERSION") or os.environ.get("CHAIN_GENESIS_HASH"):
                  raise SystemExit("普通源码构建不得携带升级目标链参数")
              purpose = "普通源码构建（不自增版本）"
              details = f"- 源码 spec_version：`{source_version}`\n"

          with summary.open("a", encoding="utf-8") as out:
              out.write("## CitizenChain WASM 构建来源\n\n")
              out.write(f"- 构建用途：{purpose}\n")
              out.write(details)
              out.write(f"- 源码提交：`{os.environ['GITHUB_SHA']}`\n")
          PY

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: wasm32v1-none
          components: rust-src

      - name: 安装系统依赖
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev

      # WASM 是后续本地启动和桌面打包的基础产物,手动运行上传本次 CI 产物。
      - name: 清理旧版 WASM artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/artifacts" \
            --jq '.artifacts[] | select(.name == "citizenchain-wasm") | .id' \
          | while read -r id; do
              echo "删除旧 artifact: $id"
              gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id" || true
            done

      - name: 删除全部旧编译产物
        working-directory: citizenchain
        run: |
          rm -rf target
          echo "已删除全部 target 目录，从零开始编译"

      - name: 编译 WASM
        working-directory: citizenchain
        env:
          WASM_BUILD_FROM_SOURCE: "1"
        run: cargo build --release -p citizenchain

      - name: 上传 WASM
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: citizenchain-wasm
          path: |
            citizenchain/target/release/wbuild/citizenchain/citizenchain.wasm
            citizenchain/target/release/wbuild/citizenchain/citizenchain.compact.wasm
            citizenchain/target/release/wbuild/citizenchain/citizenchain.compact.compressed.wasm
          retention-days: 30
