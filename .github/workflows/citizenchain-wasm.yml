name: CitizenChain WASM

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/citizenchain-wasm.yml"
      - "citizenchain/runtime/**"
  workflow_dispatch:

concurrency:
  group: citizenchain-wasm-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-wasm:
    name: 编译 WASM
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: wasm32v1-none
          components: rust-src

      - name: 安装系统依赖
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "citizenchain-wasm"
          workspaces: citizenchain -> target

      - name: 编译 WASM
        working-directory: citizenchain
        env:
          WASM_BUILD_FROM_SOURCE: "1"
        run: cargo build --release -p citizenchain

      - name: 拷贝 WASM 到 target/wasm-ci
        run: |
          mkdir -p citizenchain/target/wasm-ci
          rm -f citizenchain/target/wasm-ci/*.wasm
          cp citizenchain/target/release/wbuild/citizenchain/citizenchain.wasm citizenchain/target/wasm-ci/
          cp citizenchain/target/release/wbuild/citizenchain/citizenchain.compact.wasm citizenchain/target/wasm-ci/
          cp citizenchain/target/release/wbuild/citizenchain/citizenchain.compact.compressed.wasm citizenchain/target/wasm-ci/
          ls -la citizenchain/target/wasm-ci/

      - name: 清理旧版 WASM artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '.artifacts[] | select(.name == "citizenchain-wasm") | .id' \
          | while read -r id; do
              echo "删除旧 artifact: $id"
              gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id || true
            done

      - name: 上传 WASM
        uses: actions/upload-artifact@v4
        with:
          name: citizenchain-wasm
          path: citizenchain/target/wasm-ci/*.wasm
          retention-days: 30

      - name: 触发本地下载（通过 repository_dispatch）
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X POST repos/${{ github.repository }}/dispatches \
            -f event_type=wasm-ready \
            -f client_payload[run_id]=${{ github.run_id }} || true
