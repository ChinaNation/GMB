name: CitizenChain Linux

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: citizenchain-linux-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-linux:
    name: 打包公民链.deb (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@1.94.0

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: citizenchain/node/frontend/package-lock.json

      - name: 安装 Linux 构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            llvm-dev \
            libclang-dev \
            protobuf-compiler \
            libpam0g-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: 配置 libclang 环境变量
        run: |
          echo "LLVM_CONFIG_PATH=$(command -v llvm-config)" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "citizenchain-linux"
          workspaces: citizenchain -> target

      - name: 安装前端依赖并构建
        run: |
          npm --prefix citizenchain/node/frontend ci
          npm --prefix citizenchain/node/frontend run build

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Tauri 打包
        working-directory: citizenchain/node
        run: cargo tauri build --ci

      - name: 重命名产物
        run: |
          DEB=$(find citizenchain/target/release/bundle/deb -name '*.deb' | head -1)
          cp "$DEB" "公民链.deb"
          echo "产出: 公民链.deb ($(du -h 公民链.deb | cut -f1))"

      - name: 上传公民链.deb
        uses: actions/upload-artifact@v4
        with:
          name: 公民链-linux
          path: 公民链.deb
          retention-days: 30
          overwrite: true

      - name: 删除上一次 Linux CI
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_FILE: citizenchain-linux.yml
        run: |
          previous_run_id="$(
            gh api "repos/${{ github.repository }}/actions/workflows/$WORKFLOW_FILE/runs?branch=main&status=completed&per_page=10" \
              --jq '.workflow_runs[0].id // empty'
          )"
          if [ -z "$previous_run_id" ]; then
            echo "没有可删除的上一条 Linux CI"
            exit 0
          fi
          echo "删除上一条 Linux CI run: $previous_run_id"
          gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$previous_run_id"
