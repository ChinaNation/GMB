name: CitizenChain Linux

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/citizenchain-linux.yml"
      - "citizenchain/node/**"
      - "citizenchain/runtime/**"
      - "citizenchain/Cargo.toml"
      - "citizenchain/Cargo.lock"
  workflow_dispatch:

concurrency:
  group: citizenchain-linux-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-linux:
    name: 编译 node (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@1.94.0

      - name: 安装 Linux 构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            llvm-dev \
            libclang-dev \
            protobuf-compiler \
            libpam0g-dev

      - name: 配置 libclang 环境变量
        run: |
          echo "LLVM_CONFIG_PATH=$(command -v llvm-config)" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "citizenchain-linux"
          workspaces: citizenchain -> target

      - name: 下载最新 WASM 产物
        run: gh run download --name citizenchain-wasm --dir wasm-artifact -R ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 确认 WASM 文件位置
        run: ls -la wasm-artifact/

      - name: 设置 WASM_FILE
        run: echo "WASM_FILE=${{ github.workspace }}/wasm-artifact/citizenchain.compact.compressed.wasm" >> "$GITHUB_ENV"

      - name: 编译 node
        working-directory: citizenchain
        run: cargo build --release -p node

      - name: 运行 node 测试
        working-directory: citizenchain
        run: cargo test --release -p node

      - name: 上传 node 二进制
        uses: actions/upload-artifact@v4
        with:
          name: citizenchain-node-linux-amd64
          path: citizenchain/target/release/node
          retention-days: 30
          overwrite: true

      - name: 导出 chainspec.json 并提交到 wuminapp
        run: |
          chmod +x citizenchain/target/release/node
          citizenchain/target/release/node build-spec --chain citizenchain --raw 2>/dev/null > wuminapp/assets/chainspec.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wuminapp/assets/chainspec.json
          if git diff --cached --quiet; then
            echo "chainspec.json 未变化，跳过提交"
          else
            git commit -m "自动更新 wuminapp chainspec.json"
            git push
          fi
