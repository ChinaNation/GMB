name: CitizenChain Linux

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/citizenchain-linux.yml"
      - "citizenchain/node/**"
      - "citizenchain/runtime/**"
      - "citizenchain/Cargo.toml"
      - "citizenchain/Cargo.lock"
  workflow_dispatch:

concurrency:
  group: citizenchain-linux-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-linux:
    name: 打包公民链.deb (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@1.94.0

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: citizenchain/node/frontend/package-lock.json

      - name: 安装 Linux 构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            llvm-dev \
            libclang-dev \
            protobuf-compiler \
            libpam0g-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: 配置 libclang 环境变量
        run: |
          echo "LLVM_CONFIG_PATH=$(command -v llvm-config)" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "citizenchain-linux"
          workspaces: citizenchain -> target

      - name: 下载最新 WASM 产物
        run: gh run download --name citizenchain-wasm --dir wasm-artifact -R ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 设置 WASM_FILE
        run: echo "WASM_FILE=${{ github.workspace }}/wasm-artifact/citizenchain.compact.compressed.wasm" >> "$GITHUB_ENV"

      - name: 安装前端依赖并构建
        run: |
          npm --prefix citizenchain/node/frontend ci
          npm --prefix citizenchain/node/frontend run build

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Tauri 打包
        working-directory: citizenchain/node
        run: cargo tauri build --ci

      - name: 重命名产物
        run: |
          DEB=$(find citizenchain/target/release/bundle/deb -name '*.deb' | head -1)
          cp "$DEB" "公民链.deb"
          echo "产出: 公民链.deb ($(du -h 公民链.deb | cut -f1))"

      - name: 上传公民链.deb
        uses: actions/upload-artifact@v4
        with:
          name: 公民链-linux
          path: 公民链.deb
          retention-days: 30
          overwrite: true

      # 导出 chainspec.json 供 wuminapp CI 使用
      - name: 清理旧版 chainspec artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '.artifacts[] | select(.name == "citizenchain-chainspec") | .id' \
          | while read -r id; do
              echo "删除旧 artifact: $id"
              gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id || true
            done

      - name: 导出 chainspec.json
        run: |
          chmod +x citizenchain/target/release/node
          citizenchain/target/release/node build-spec --chain citizenchain --raw 2>/dev/null > chainspec.json
          echo "chainspec.json 已导出 ($(wc -c < chainspec.json) bytes)"

      - name: 上传 chainspec.json
        uses: actions/upload-artifact@v4
        with:
          name: citizenchain-chainspec
          path: chainspec.json
          retention-days: 30
