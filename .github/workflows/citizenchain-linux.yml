name: CitizenChain Linux

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: citizenchain-linux-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-linux:
    name: 打包公民链.deb (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@1.94.0

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: citizenchain/node/frontend/package-lock.json

      - name: 安装 Linux 构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            llvm-dev \
            libclang-dev \
            protobuf-compiler \
            libpam0g-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: 配置 libclang 环境变量
        run: |
          echo "LLVM_CONFIG_PATH=$(command -v llvm-config)" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "citizenchain-linux"
          workspaces: citizenchain -> target

      - name: 安装前端依赖并构建
        run: |
          npm --prefix citizenchain/node/frontend ci
          npm --prefix citizenchain/node/frontend run build

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Tauri 打包
        working-directory: citizenchain/node
        run: cargo tauri build --ci

      - name: 重命名产物
        run: |
          DEB=$(find citizenchain/target/release/bundle/deb -name '*.deb' | head -1)
          cp "$DEB" "公民链.deb"
          echo "产出: 公民链.deb ($(du -h 公民链.deb | cut -f1))"

      - name: 上传公民链.deb
        uses: actions/upload-artifact@v4
        with:
          name: 公民链-linux
          path: 公民链.deb
          retention-days: 30
          overwrite: true

  deploy-linux-servers:
    name: 部署公民链.deb 到 6 台服务器
    needs: build-linux
    runs-on: ubuntu-latest
    env:
      CITIZENCHAIN_DEPLOY_USER: ${{ secrets.CITIZENCHAIN_DEPLOY_USER || vars.CITIZENCHAIN_DEPLOY_USER || 'ubuntu' }}
      CITIZENCHAIN_DEPLOY_SSH_KEY: ${{ secrets.CITIZENCHAIN_DEPLOY_SSH_KEY || secrets.SFID_DEPLOY_SSH_KEY || secrets.CITIZENCHAIN_SSH_KEY }}
      CITIZENCHAIN_DEPLOY_SERVERS: |
        147.224.14.117
        64.181.239.233
        158.180.91.13
        168.110.119.55
        140.83.56.145
        217.142.255.172
    steps:
      - name: 拉取部署配置
        uses: actions/checkout@v4

      - name: 下载本次 Linux 安装包
        uses: actions/download-artifact@v4
        with:
          name: 公民链-linux
          path: linux-package

      - name: 滚动部署到服务器
        run: |
          set -euo pipefail

          if [ -z "${CITIZENCHAIN_DEPLOY_SSH_KEY:-}" ]; then
            echo "::error::缺少 CITIZENCHAIN_DEPLOY_SSH_KEY、SFID_DEPLOY_SSH_KEY 或 CITIZENCHAIN_SSH_KEY，无法部署服务器。"
            exit 1
          fi

          deb_file="$(find linux-package -name '*.deb' | head -1)"
          if [ -z "$deb_file" ]; then
            echo "::error::未找到本次 Linux CI 产出的 deb 安装包。"
            exit 1
          fi

          ssh_dir="$RUNNER_TEMP/citizenchain-linux-deploy-ssh"
          mkdir -p "$ssh_dir"
          key_file="$ssh_dir/id_ed25519"
          known_hosts_file="$ssh_dir/known_hosts"
          printf '%s\n' "$CITIZENCHAIN_DEPLOY_SSH_KEY" | tr -d '\r' > "$key_file"
          chmod 600 "$key_file"
          : > "$known_hosts_file"

          for server_ip in $CITIZENCHAIN_DEPLOY_SERVERS; do
            ssh-keyscan -H "$server_ip" >> "$known_hosts_file"
          done

          # 中文注释：6 台服务器必须顺序滚动部署，避免同时重启导致链服务整体抖动。
          for server_ip in $CITIZENCHAIN_DEPLOY_SERVERS; do
            ssh_target="$CITIZENCHAIN_DEPLOY_USER@$server_ip"
            echo "::group::部署 $ssh_target"

            ssh_opts=(
              -i "$key_file"
              -o BatchMode=yes
              -o StrictHostKeyChecking=yes
              -o UserKnownHostsFile="$known_hosts_file"
              -o ConnectTimeout=30
              -o ServerAliveInterval=10
              -o ServerAliveCountMax=6
            )

            ssh "${ssh_opts[@]}" "$ssh_target" "
              set -e
              sudo useradd --system --no-create-home --shell /usr/sbin/nologin citizenchain 2>/dev/null || true
              sudo mkdir -p /opt/citizenchain/data
              sudo chown -R citizenchain:citizenchain /opt/citizenchain
              sudo iptables -C INPUT -p tcp --dport 30333 -j ACCEPT 2>/dev/null || sudo iptables -I INPUT -p tcp --dport 30333 -j ACCEPT
              sudo sh -c 'iptables-save > /etc/iptables/rules.v4' 2>/dev/null || true
            "

            scp "${ssh_opts[@]}" citizenchain/scripts/citizenchain-node.service "$ssh_target:/tmp/citizenchain-node.service"
            ssh "${ssh_opts[@]}" "$ssh_target" "
              set -e
              sudo mv /tmp/citizenchain-node.service /etc/systemd/system/citizenchain-node.service
              sudo systemctl daemon-reload
              sudo systemctl enable citizenchain-node
              sudo systemctl stop citizenchain-node 2>/dev/null || true
            "

            scp "${ssh_opts[@]}" "$deb_file" "$ssh_target:/tmp/citizenchain.deb"
            ssh "${ssh_opts[@]}" "$ssh_target" "
              set -e
              sudo dpkg -i /tmp/citizenchain.deb || sudo apt-get install -f -y
              rm -f /tmp/citizenchain.deb
              sudo systemctl start citizenchain-node
              sleep 5
              sudo systemctl is-active --quiet citizenchain-node
            "

            echo "部署完成: $ssh_target"
            echo "::endgroup::"
          done

      - name: 删除上一次 Linux CI
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_FILE: citizenchain-linux.yml
        run: |
          previous_run_id="$(
            gh api "repos/${{ github.repository }}/actions/workflows/$WORKFLOW_FILE/runs?branch=main&status=completed&per_page=10" \
              --jq '.workflow_runs[0].id // empty'
          )"
          if [ -z "$previous_run_id" ]; then
            echo "没有可删除的上一条 Linux CI"
            exit 0
          fi
          echo "删除上一条 Linux CI run: $previous_run_id"
          gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$previous_run_id"
