name: citizenchain-multi-platform-installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            sidecar_name: citizenchain-node-aarch64-apple-darwin
            plain_name: citizenchain-node
            bundles: dmg
          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_name: citizenchain-node-x86_64-pc-windows-msvc.exe
            plain_name: citizenchain-node.exe
            bundles: msi,nsis
          - platform: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar_name: citizenchain-node-x86_64-unknown-linux-gnu
            plain_name: citizenchain-node
            bundles: deb,appimage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: citizenchain/nodeui/frontend/package-lock.json

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            citizenchain/nodeui -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build blockchain node binary
        run: cargo build -p node --release --target ${{ matrix.target }}

      - name: Prepare bundled node binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          BIN_DIR="citizenchain/nodeui/backend/binaries"
          SRC="target/${{ matrix.target }}/release/node"
          SIDE="$BIN_DIR/${{ matrix.sidecar_name }}"
          PLAIN="$BIN_DIR/${{ matrix.plain_name }}"
          cp "$SRC" "$SIDE"
          cp "$SRC" "$PLAIN"
          chmod +x "$SIDE" "$PLAIN"
          shasum -a 256 "$PLAIN" | awk '{print $1}' > "$BIN_DIR/citizenchain-node.sha256"

      - name: Prepare bundled node binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binDir = "citizenchain/nodeui/backend/binaries"
          $src = "target/${{ matrix.target }}/release/node.exe"
          $side = "$binDir/${{ matrix.sidecar_name }}"
          $plain = "$binDir/${{ matrix.plain_name }}"
          Copy-Item $src $side -Force
          Copy-Item $src $plain -Force
          $hash = (Get-FileHash -Algorithm SHA256 $plain).Hash.ToLower()
          [System.IO.File]::WriteAllText("$binDir/citizenchain-node.sha256", $hash)

      - name: Install frontend dependencies
        run: npm --prefix citizenchain/nodeui/frontend ci

      - name: Build installer bundles
        run: npm --prefix citizenchain/nodeui/frontend run tauri:build -- --bundles ${{ matrix.bundles }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: citizenchain-${{ matrix.platform }}
          path: citizenchain/nodeui/**/bundle/**/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: citizenchain-*
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
