name: CitizenChain macOS

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: citizenchain-macos-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-macos:
    name: 打包公民链.dmg (macOS)
    runs-on: macos-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@1.94.0

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: citizenchain/node/frontend/package-lock.json

      - name: 安装构建依赖
        run: brew install protobuf llvm

      - name: 配置 LLVM 环境变量
        run: |
          echo "LLVM_CONFIG_PATH=$(brew --prefix llvm)/bin/llvm-config" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "citizenchain-macos"
          workspaces: citizenchain -> target

      - name: 安装前端依赖并构建
        run: |
          npm --prefix citizenchain/node/frontend ci
          npm --prefix citizenchain/node/frontend run build

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Tauri 打包
        working-directory: citizenchain/node
        run: cargo tauri build --ci

      - name: 重命名产物
        run: |
          DMG=$(find citizenchain/target/release/bundle/dmg -name '*.dmg' | head -1)
          cp "$DMG" "公民链.dmg"
          echo "产出: 公民链.dmg ($(du -h 公民链.dmg | cut -f1))"

      - name: 上传公民链.dmg
        uses: actions/upload-artifact@v4
        with:
          name: 公民链-macos
          path: 公民链.dmg
          retention-days: 30
          overwrite: true

      - name: 删除上一次 macOS CI
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_FILE: citizenchain-macos.yml
        run: |
          previous_run_id="$(
            gh api "repos/${{ github.repository }}/actions/workflows/$WORKFLOW_FILE/runs?branch=main&status=completed&per_page=10" \
              --jq '.workflow_runs[0].id // empty'
          )"
          if [ -z "$previous_run_id" ]; then
            echo "没有可删除的上一条 macOS CI"
            exit 0
          fi
          echo "删除上一条 macOS CI run: $previous_run_id"
          gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$previous_run_id"
