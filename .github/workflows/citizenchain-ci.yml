name: CitizenChain

on:
  push:
    branches: [main]
    # 中文注释:按 ci-path-routing 文档,node 桌面端/deb 构建只在 node 目录(含
    # chainspecs/)变更时触发。runtime/** 改动只走 citizenchain-wasm.yml;待 wasm CI
    # 产出新 WASM 后用 bake-chainspec.sh 重生 plain SSOT + genesis-state,再推送触发本 CI。
    paths:
      - "citizenchain/node/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: citizenchain-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CITIZENCHAIN_DESKTOP_VERSION: 1.0.${{ github.run_number }}

jobs:
  build-desktop:
    name: 打包公民链桌面端 (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            name: Linux amd
            os: ubuntu-latest
            artifact: 公民链-Linux-amd
            installer_name: 公民链-Linux-amd.deb
            push_bundle_targets: deb
            manual_bundle_targets: deb,appimage
            updater_asset_name: citizenchain-updater-linux-amd.AppImage
            expected_runner_arch: X64
            deb_arch: amd64
            cache_key: citizenchain-linux-amd
          - platform: linux
            name: Linux arm
            os: ubuntu-24.04-arm
            artifact: 公民链-Linux-arm
            installer_name: 公民链-Linux-arm.deb
            push_bundle_targets: deb
            manual_bundle_targets: deb,appimage
            updater_asset_name: citizenchain-updater-linux-arm.AppImage
            expected_runner_arch: ARM64
            deb_arch: arm64
            cache_key: citizenchain-linux-arm
          - platform: windows
            name: Windows
            os: windows-latest
            artifact: 公民链-Windows
            installer_name: 公民链-Windows.exe
            push_bundle_targets: nsis
            manual_bundle_targets: nsis
            expected_runner_arch: X64
            cache_key: citizenchain-windows
          - platform: macos
            name: macOS Apple
            os: macos-15
            artifact: 公民链-macOS-apple
            installer_name: 公民链-macOS-apple.dmg
            push_bundle_targets: dmg
            manual_bundle_targets: dmg
            updater_asset_name: citizenchain-updater-macos-apple.app.tar.gz
            expected_runner_arch: ARM64
            cache_key: citizenchain-macos-apple
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 校验 runner 架构
        shell: bash
        env:
          EXPECTED_RUNNER_ARCH: ${{ matrix.expected_runner_arch }}
        run: |
          set -euo pipefail
          if [ "${RUNNER_ARCH}" != "${EXPECTED_RUNNER_ARCH}" ]; then
            echo "::error::runner 架构不符合 ${EXPECTED_RUNNER_ARCH}: 当前为 ${RUNNER_ARCH}"
            exit 1
          fi

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@1.94.0

      - name: 安装 Node.js
        # 固定使用 Node.js 24,与项目 package.json engines 和 GitHub Actions node24 运行时一致。
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: citizenchain/node/frontend/package-lock.json

      - name: 同步桌面端版本
        shell: bash
        env:
          CITIZENCHAIN_PUSH_BUNDLE_TARGETS: ${{ matrix.push_bundle_targets }}
          CITIZENCHAIN_MANUAL_BUNDLE_TARGETS: ${{ matrix.manual_bundle_targets }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const version = process.env.CITIZENCHAIN_DESKTOP_VERSION;
          const isManualRelease = process.env.GITHUB_EVENT_NAME === 'workflow_dispatch';
          const targetSource = isManualRelease
            ? process.env.CITIZENCHAIN_MANUAL_BUNDLE_TARGETS
            : process.env.CITIZENCHAIN_PUSH_BUNDLE_TARGETS;
          const bundleTargets = (targetSource || '')
            .split(',')
            .map((target) => target.trim())
            .filter(Boolean);

          if (bundleTargets.length === 0) {
            throw new Error('缺少本 matrix 的 Tauri bundle targets。');
          }

          const cargoPath = 'citizenchain/Cargo.toml';
          let cargo = fs.readFileSync(cargoPath, 'utf8');
          cargo = cargo.replace(
            /(\[workspace\.package\][\s\S]*?\nversion\s*=\s*")[^"]+(")/,
            `$1${version}$2`
          );
          fs.writeFileSync(cargoPath, cargo);

          const tauriPath = 'citizenchain/node/tauri.conf.json';
          const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
          tauri.version = version;
          tauri.bundle = tauri.bundle || {};
          // 中文注释：push 只生成用户安装包；手动发布允许额外生成 updater 内部产物。
          tauri.bundle.targets = bundleTargets;
          // 中文注释：push 构建只做打包检查；手动发布的 updater 公钥和签名密钥由后续手动步骤注入。
          delete tauri.bundle.createUpdaterArtifacts;
          fs.writeFileSync(tauriPath, `${JSON.stringify(tauri, null, 2)}\n`);

          console.log(`桌面端本次发布版本: ${version}`);
          console.log(`手动发布模式: ${isManualRelease ? '是' : '否'}`);
          console.log(`Tauri bundle targets: ${bundleTargets.join(',')}`);
          NODE

      - name: 配置手动发布 updater
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          GMB_TOP_PUBKEY: ${{ secrets.GMB_TOP_PUBKEY }}
          GMB_TOP_KEY: ${{ secrets.GMB_TOP_KEY }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const updaterPubkey = (process.env.GMB_TOP_PUBKEY || '').trim();
          const signingPrivateKey = (process.env.GMB_TOP_KEY || '').trim();
          if (!updaterPubkey) {
            throw new Error('手动发布缺少 GMB_TOP_PUBKEY secret。');
          }
          if (!signingPrivateKey) {
            throw new Error('手动发布缺少 GMB_TOP_KEY secret。');
          }

          const tauriPath = 'citizenchain/node/tauri.conf.json';
          const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
          tauri.bundle = tauri.bundle || {};
          tauri.bundle.createUpdaterArtifacts = true;
          tauri.plugins = tauri.plugins || {};
          tauri.plugins.updater = tauri.plugins.updater || {};
          tauri.plugins.updater.pubkey = updaterPubkey;
          fs.writeFileSync(tauriPath, `${JSON.stringify(tauri, null, 2)}\n`);
          NODE

      - name: 安装 Linux 构建依赖
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            llvm-dev \
            libclang-dev \
            protobuf-compiler \
            libpam0g-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      - name: 配置 Linux libclang 环境变量
        if: matrix.platform == 'linux'
        run: |
          echo "LLVM_CONFIG_PATH=$(command -v llvm-config)" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"

      - name: 安装 macOS 构建依赖
        if: matrix.platform == 'macos'
        run: brew install protobuf llvm

      - name: 配置 macOS LLVM 环境变量
        if: matrix.platform == 'macos'
        run: |
          echo "LLVM_CONFIG_PATH=$(brew --prefix llvm)/bin/llvm-config" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: 安装 Windows 构建依赖
        if: matrix.platform == 'windows'
        run: |
          choco install protoc -y
          choco install llvm -y
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\lib" >> $env:GITHUB_ENV

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.cache_key }}
          workspaces: citizenchain -> target

      - name: 安装前端依赖并构建
        run: |
          npm --prefix citizenchain/node/frontend ci
          npm --prefix citizenchain/node/frontend run build

      - name: 准备创世状态资源目录
        run: |
          # push 检查不生成正式创世状态包;正式安装包由 prepack 从
          # target/chainspec/genesis-state/ 复制真实 manifest + db。
          mkdir -p citizenchain/node/resources/genesis-state

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Tauri 打包（push 检查）
        if: ${{ github.event_name != 'workflow_dispatch' }}
        working-directory: citizenchain/node
        run: cargo tauri build --ci

      - name: Tauri 打包（手动发布）
        if: ${{ github.event_name == 'workflow_dispatch' }}
        working-directory: citizenchain/node
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.GMB_TOP_KEY }}
        run: cargo tauri build --ci

      - name: 整理 Linux 产物
        if: matrix.platform == 'linux'
        shell: bash
        env:
          INSTALLER_NAME: ${{ matrix.installer_name }}
          UPDATER_ASSET_NAME: ${{ matrix.updater_asset_name }}
          EXPECTED_DEB_ARCH: ${{ matrix.deb_arch }}
        run: |
          set -euo pipefail
          mkdir -p citizenchain-release

          deb_file="$(find citizenchain/target/release/bundle/deb -name '*.deb' | head -1)"
          if [ -z "$deb_file" ]; then
            echo "::error::未找到 Linux deb 安装包。"
            exit 1
          fi
          actual_deb_arch="$(dpkg-deb -f "$deb_file" Architecture)"
          if [ "$actual_deb_arch" != "$EXPECTED_DEB_ARCH" ]; then
            echo "::error::deb 架构不符合 ${EXPECTED_DEB_ARCH}: 当前为 ${actual_deb_arch}"
            exit 1
          fi
          cp "$deb_file" "citizenchain-release/${INSTALLER_NAME}"

          appimage_file=""
          if [ -d citizenchain/target/release/bundle/appimage ]; then
            appimage_file="$(find citizenchain/target/release/bundle/appimage -name '*.AppImage' | head -1)"
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ -z "$appimage_file" ]; then
              echo "::error::手动发布缺少 Linux updater AppImage。"
              exit 1
            fi
            appimage_sig="${appimage_file}.sig"
            if [ ! -f "$appimage_sig" ]; then
              echo "::error::手动发布缺少 Linux updater 签名: $appimage_sig"
              exit 1
            fi
            cp "$appimage_file" "citizenchain-release/${UPDATER_ASSET_NAME}"
            cp "$appimage_sig" "citizenchain-release/${UPDATER_ASSET_NAME}.sig"
          fi

          ls -lh citizenchain-release

      - name: 整理 macOS 产物
        if: matrix.platform == 'macos'
        shell: bash
        env:
          INSTALLER_NAME: ${{ matrix.installer_name }}
          UPDATER_ASSET_NAME: ${{ matrix.updater_asset_name }}
        run: |
          set -euo pipefail
          mkdir -p citizenchain-release

          dmg_file="$(find citizenchain/target/release/bundle/dmg -name '*.dmg' | head -1)"
          if [ -z "$dmg_file" ]; then
            echo "::error::未找到 macOS dmg 安装包。"
            exit 1
          fi
          cp "$dmg_file" "citizenchain-release/${INSTALLER_NAME}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            updater_file="$(find citizenchain/target/release/bundle/macos -name '*.app.tar.gz' | head -1)"
            if [ -z "$updater_file" ]; then
              echo "::error::手动发布缺少 macOS updater 归档。"
              exit 1
            fi
            updater_sig="${updater_file}.sig"
            if [ ! -f "$updater_sig" ]; then
              echo "::error::手动发布缺少 macOS updater 签名: $updater_sig"
              exit 1
            fi
            cp "$updater_file" "citizenchain-release/${UPDATER_ASSET_NAME}"
            cp "$updater_sig" "citizenchain-release/${UPDATER_ASSET_NAME}.sig"
          fi

          ls -lh citizenchain-release

      - name: 整理 Windows 产物
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $installerName = "${{ matrix.installer_name }}"
          New-Item -ItemType Directory -Force citizenchain-release | Out-Null

          $exe = Get-ChildItem -Path "citizenchain/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          if ($null -eq $exe) {
            Write-Error "未找到 Windows exe 安装包。"
            exit 1
          }

          Copy-Item $exe.FullName (Join-Path "citizenchain-release" $installerName)
          if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch") {
            $sigPath = "$($exe.FullName).sig"
            if (-not (Test-Path $sigPath)) {
              Write-Error "手动发布缺少 Windows updater 签名: $sigPath"
              exit 1
            }
            Copy-Item $sigPath (Join-Path "citizenchain-release" "$installerName.sig")
          }
          Get-ChildItem citizenchain-release | Format-Table Name, Length

      - name: 上传桌面端产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: citizenchain-release/*
          retention-days: 30
          overwrite: true

  publish-github-release:
    name: 发布桌面端 GitHub Release
    needs: build-desktop
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取发布上下文
        uses: actions/checkout@v5

      - name: 下载四个安装包与 updater 产物
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: 发布到 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          DESKTOP_VERSION: ${{ env.CITIZENCHAIN_DESKTOP_VERSION }}
          CURRENT_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          tag="citizenchain-v${DESKTOP_VERSION}"
          title="CitizenChain ${DESKTOP_VERSION}"
          notes="公民链桌面端 ${DESKTOP_VERSION}。本发布的用户安装包固定为 4 个，另包含自动更新专用内部资产；runtime WASM 继续走链上 setCode 协议升级。"

          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const root = 'release-artifacts';
          const version = process.env.DESKTOP_VERSION;
          const repo = process.env.CURRENT_REPOSITORY;
          const tag = `citizenchain-v${version}`;
          const notes = `公民链桌面端 ${version}。`;

          function walk(dir) {
            return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
              const full = path.join(dir, entry.name);
              return entry.isDirectory() ? walk(full) : [full];
            });
          }

          const files = new Map(walk(root).map((file) => [path.basename(file), file]));
          const platforms = {};
          const requiredInstallers = [
            '公民链-macOS-apple.dmg',
            '公民链-Windows.exe',
            '公民链-Linux-amd.deb',
            '公民链-Linux-arm.deb',
          ];

          for (const installer of requiredInstallers) {
            if (!files.has(installer)) {
              throw new Error(`缺少正式用户安装包: ${installer}`);
            }
          }

          function assetUrl(name) {
            return `https://github.com/${repo}/releases/download/${tag}/${encodeURIComponent(name)}`;
          }

          function addPlatform(platform, assetName) {
            const assetPath = files.get(assetName);
            const sigPath = files.get(`${assetName}.sig`);
            if (!assetPath || !sigPath) {
              throw new Error(`缺少 ${platform} updater 产物或签名: ${assetName}`);
            }
            platforms[platform] = {
              signature: fs.readFileSync(sigPath, 'utf8').trim(),
              url: assetUrl(assetName),
            };
          }

          addPlatform('linux-x86_64', 'citizenchain-updater-linux-amd.AppImage');
          addPlatform('linux-aarch64', 'citizenchain-updater-linux-arm.AppImage');
          addPlatform('windows-x86_64', '公民链-Windows.exe');
          addPlatform('darwin-aarch64', 'citizenchain-updater-macos-apple.app.tar.gz');

          fs.writeFileSync(
            path.join(root, 'citizenchain-latest.json'),
            `${JSON.stringify({
              version,
              notes,
              pub_date: new Date().toISOString(),
              platforms,
            }, null, 2)}\n`
          );
          NODE

          mapfile -t assets < <(find release-artifacts -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "::error::没有找到可发布的桌面端产物。"
            exit 1
          fi

          if gh release view "$tag" --repo "$CURRENT_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber --repo "$CURRENT_REPOSITORY"
          else
            gh release create "$tag" "${assets[@]}" --repo "$CURRENT_REPOSITORY" --target "$GITHUB_SHA" --title "$title" --notes "$notes"
          fi

  deploy-linux-servers:
    name: 部署公民链-Linux-amd.deb 到 6 台服务器
    needs: build-desktop
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      GMB_SSH_USER: ubuntu
      GMB_SSH_PORT: "22"
      GMB_SSH_KEY: ${{ secrets.GMB_SSH_KEY }}
      GMB_DEPLOY_SERVERS: |
        147.224.14.117
        64.181.239.233
        158.180.91.13
        168.110.119.55
        140.83.56.145
        217.142.255.172
    steps:
      - name: 拉取部署配置
        uses: actions/checkout@v5

      - name: 下载本次 Linux 安装包
        uses: actions/download-artifact@v4
        with:
          name: 公民链-Linux-amd
          path: linux-package

      - name: 滚动部署到服务器
        run: |
          set -euo pipefail

          if [ -z "${GMB_SSH_KEY:-}" ]; then
            echo "::error::缺少 GMB_SSH_KEY，无法部署服务器。"
            exit 1
          fi

          deb_file="linux-package/公民链-Linux-amd.deb"
          if [ ! -f "$deb_file" ]; then
            echo "::error::未找到本次 Linux amd CI 产出的 deb 安装包: $deb_file"
            exit 1
          fi
          deb_arch="$(dpkg-deb -f "$deb_file" Architecture)"
          if [ "$deb_arch" != "amd64" ]; then
            echo "::error::服务器部署只能使用 amd64 deb，当前为: $deb_arch"
            exit 1
          fi

          ssh_dir="$RUNNER_TEMP/citizenchain-linux-deploy-ssh"
          mkdir -p "$ssh_dir"
          key_file="$ssh_dir/id_ed25519"
          known_hosts_file="$ssh_dir/known_hosts"
          printf '%s\n' "$GMB_SSH_KEY" | tr -d '\r' > "$key_file"
          chmod 600 "$key_file"
          : > "$known_hosts_file"

          for server_ip in $GMB_DEPLOY_SERVERS; do
            ssh-keyscan -p "$GMB_SSH_PORT" -H "$server_ip" >> "$known_hosts_file"
          done

          ssh_opts=(
            -i "$key_file"
            -p "$GMB_SSH_PORT"
            -o BatchMode=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$known_hosts_file"
            -o ConnectTimeout=30
            -o ServerAliveInterval=10
            -o ServerAliveCountMax=6
          )

          # 中文注释：先确认 6 台服务器都认可同一把部署密钥，避免前几台已升级、后几台因 SSH 失败留下半部署状态。
          for server_ip in $GMB_DEPLOY_SERVERS; do
            ssh_target="$GMB_SSH_USER@$server_ip"
            echo "::group::预检查 $ssh_target"
            ssh "${ssh_opts[@]}" "$ssh_target" "echo deploy-ready:\$(hostname):\$(whoami)"
            echo "::endgroup::"
          done

          # 中文注释：预检查全部通过后，再顺序滚动部署，避免同时重启导致链服务整体抖动。
          for server_ip in $GMB_DEPLOY_SERVERS; do
            ssh_target="$GMB_SSH_USER@$server_ip"
            echo "::group::部署 $ssh_target"

            ssh "${ssh_opts[@]}" "$ssh_target" "
              set -e
              sudo useradd --system --no-create-home --shell /usr/sbin/nologin citizenchain 2>/dev/null || true
              sudo mkdir -p /opt/citizenchain/data
              sudo chown -R citizenchain:citizenchain /opt/citizenchain
              sudo iptables -C INPUT -p tcp --dport 30333 -j ACCEPT 2>/dev/null || sudo iptables -I INPUT -p tcp --dport 30333 -j ACCEPT
              sudo sh -c 'iptables-save > /etc/iptables/rules.v4' 2>/dev/null || true
            "

            scp "${ssh_opts[@]}" citizenchain/scripts/citizenchain-node.service "$ssh_target:/tmp/citizenchain-node.service"
            ssh "${ssh_opts[@]}" "$ssh_target" "
              set -e
              sudo mv /tmp/citizenchain-node.service /etc/systemd/system/citizenchain-node.service
              sudo systemctl daemon-reload
              sudo systemctl enable citizenchain-node
              sudo systemctl stop citizenchain-node 2>/dev/null || true
            "

            scp "${ssh_opts[@]}" "$deb_file" "$ssh_target:/tmp/citizenchain.deb"
            ssh "${ssh_opts[@]}" "$ssh_target" "
              set -e
              sudo dpkg -i /tmp/citizenchain.deb || sudo apt-get install -f -y
              rm -f /tmp/citizenchain.deb
              sudo systemctl start citizenchain-node
              sleep 5
              sudo systemctl is-active --quiet citizenchain-node
            "

            echo "部署完成: $ssh_target"
            echo "::endgroup::"
          done

  cleanup-old-runs:
    name: 删除上一次 CitizenChain CI
    needs:
      - publish-github-release
      - deploy-linux-servers
    if: ${{ github.event_name == 'workflow_dispatch' && success() }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: 删除上一次 CI 记录
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_FILE: citizenchain.yml
        run: |
          previous_run_id="$(
            gh api "repos/${{ github.repository }}/actions/workflows/$WORKFLOW_FILE/runs?branch=main&status=completed&per_page=10" \
              --jq '.workflow_runs[0].id // empty'
          )"
          if [ -z "$previous_run_id" ]; then
            echo "没有可删除的上一条 CitizenChain CI"
            exit 0
          fi
          echo "删除上一条 CitizenChain CI run: $previous_run_id"
          gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$previous_run_id"
