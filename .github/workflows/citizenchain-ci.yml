name: CitizenChain
run-name: 创世

on:
  push:
    branches: [main]
    # 中文注释:按 ci-path-routing 文档,node 桌面端/deb 构建只在 node 目录(含
    # chainspecs/)变更时触发。runtime/** 改动只走 citizenchain-wasm.yml;待 wasm CI
    # runtime/** 改动只走 citizenchain-wasm.yml；桌面端 CI 只负责构建四个平台软件。
    paths:
      - ".github/workflows/citizenchain-ci.yml"
      - "citizenchain/node/**"
  workflow_dispatch:
    inputs:
      mode:
        description: 执行 CI 或正式发布
        required: true
        type: choice
        options:
          - ci
          - release

permissions:
  contents: read

concurrency:
  group: citizenchain-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # 中文注释:桌面端版本以源码 tauri.conf.json/Cargo.toml 为准(由公民控制台按 ci=+0.0.1 / release=+0.1 自增),CI 不再用 run_number 覆盖。
  GMB_RELEASE_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'release' }}

jobs:
  build-desktop:
    name: 打包公民链桌面端 (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            name: Linux amd
            os: ubuntu-latest
            artifact: 公民链AMD
            installer_name: 公民链AMD.deb
            push_bundle_targets: deb
            manual_bundle_targets: deb,appimage
            updater_asset_name: citizenchain-updater-linux-amd.AppImage
            expected_runner_arch: X64
            deb_arch: amd64
            cache_key: citizenchain-linux-amd
          - platform: linux
            name: Linux arm
            os: ubuntu-24.04-arm
            artifact: 公民链ARM
            installer_name: 公民链ARM.deb
            push_bundle_targets: deb
            manual_bundle_targets: deb,appimage
            updater_asset_name: citizenchain-updater-linux-arm.AppImage
            expected_runner_arch: ARM64
            deb_arch: arm64
            cache_key: citizenchain-linux-arm
          - platform: windows
            name: Windows
            os: windows-latest
            artifact: 公民链Windows
            installer_name: 公民链.exe
            push_bundle_targets: nsis
            manual_bundle_targets: nsis
            expected_runner_arch: X64
            cache_key: citizenchain-windows
          - platform: macos
            name: macOS Apple
            os: macos-15
            artifact: 公民链macOS
            installer_name: 公民链.dmg
            push_bundle_targets: dmg
            manual_bundle_targets: dmg
            updater_asset_name: citizenchain-updater-macos-apple.app.tar.gz
            expected_runner_arch: ARM64
            cache_key: citizenchain-macos-apple
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 校验 runner 架构
        shell: bash
        env:
          EXPECTED_RUNNER_ARCH: ${{ matrix.expected_runner_arch }}
        run: |
          set -euo pipefail
          if [ "${RUNNER_ARCH}" != "${EXPECTED_RUNNER_ARCH}" ]; then
            echo "::error::runner 架构不符合 ${EXPECTED_RUNNER_ARCH}: 当前为 ${RUNNER_ARCH}"
            exit 1
          fi

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@1.94.0

      - name: 安装 Node.js
        # 固定使用 Node.js 24,与项目 package.json engines 和 GitHub Actions node24 运行时一致。
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: citizenchain/node/frontend/package-lock.json

      - name: 同步桌面端版本
        shell: bash
        env:
          CITIZENCHAIN_PUSH_BUNDLE_TARGETS: ${{ matrix.push_bundle_targets }}
          CITIZENCHAIN_MANUAL_BUNDLE_TARGETS: ${{ matrix.manual_bundle_targets }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const isManualRelease = process.env.GMB_RELEASE_MODE === 'true';
          const targetSource = isManualRelease
            ? process.env.CITIZENCHAIN_MANUAL_BUNDLE_TARGETS
            : process.env.CITIZENCHAIN_PUSH_BUNDLE_TARGETS;
          const bundleTargets = (targetSource || '')
            .split(',')
            .map((target) => target.trim())
            .filter(Boolean);

          if (bundleTargets.length === 0) {
            throw new Error('缺少本 matrix 的 Tauri bundle targets。');
          }

          // 中文注释:版本号以源码 tauri.conf.json 为准(公民控制台已按 ci/release 自增),CI 不覆盖,只设 bundle 目标。
          const tauriPath = 'citizenchain/node/tauri.conf.json';
          const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
          const version = tauri.version;
          tauri.bundle = tauri.bundle || {};
          // 中文注释：push 只生成用户安装包；手动发布允许额外生成 updater 内部产物。
          tauri.bundle.targets = bundleTargets;
          // 中文注释：push 构建只做打包检查；手动发布的 updater 公钥和签名密钥由后续手动步骤注入。
          delete tauri.bundle.createUpdaterArtifacts;
          fs.writeFileSync(tauriPath, `${JSON.stringify(tauri, null, 2)}\n`);

          console.log(`桌面端版本(源码): ${version}`);
          console.log(`手动发布模式: ${isManualRelease ? '是' : '否'}`);
          console.log(`Tauri bundle targets: ${bundleTargets.join(',')}`);
          NODE

      - name: 配置手动发布 updater
        if: ${{ env.GMB_RELEASE_MODE == 'true' }}
        shell: bash
        env:
          GMB_TOP_PUBKEY: ${{ secrets.GMB_TOP_PUBKEY }}
          GMB_TOP_KEY: ${{ secrets.GMB_TOP_KEY }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const updaterPubkey = (process.env.GMB_TOP_PUBKEY || '').trim();
          const signingPrivateKey = (process.env.GMB_TOP_KEY || '').trim();
          if (!updaterPubkey) {
            throw new Error('手动发布缺少 GMB_TOP_PUBKEY secret。');
          }
          if (!signingPrivateKey) {
            throw new Error('手动发布缺少 GMB_TOP_KEY secret。');
          }

          const tauriPath = 'citizenchain/node/tauri.conf.json';
          const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
          tauri.bundle = tauri.bundle || {};
          tauri.bundle.createUpdaterArtifacts = true;
          tauri.plugins = tauri.plugins || {};
          tauri.plugins.updater = tauri.plugins.updater || {};
          tauri.plugins.updater.pubkey = updaterPubkey;
          fs.writeFileSync(tauriPath, `${JSON.stringify(tauri, null, 2)}\n`);
          NODE

      - name: 安装 Linux 构建依赖
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            llvm-dev \
            libclang-dev \
            protobuf-compiler \
            libpam0g-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      - name: 配置 Linux libclang 环境变量
        if: matrix.platform == 'linux'
        run: |
          {
            echo "LLVM_CONFIG_PATH=$(command -v llvm-config)"
            echo "LIBCLANG_PATH=$(llvm-config --libdir)"
            echo "PROTOC=$(command -v protoc)"
          } >> "$GITHUB_ENV"

      - name: 安装 macOS 构建依赖
        if: matrix.platform == 'macos'
        run: brew install protobuf llvm

      - name: 配置 macOS LLVM 环境变量
        if: matrix.platform == 'macos'
        run: |
          echo "LLVM_CONFIG_PATH=$(brew --prefix llvm)/bin/llvm-config" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: 安装 Windows 构建依赖
        if: matrix.platform == 'windows'
        run: |
          choco install protoc -y
          choco install llvm -y
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\lib" >> "$env:GITHUB_ENV"

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.cache_key }}
          workspaces: citizenchain -> target

      - name: 安装前端依赖并构建
        run: |
          npm --prefix citizenchain/node/frontend ci
          npm --prefix citizenchain/node/frontend run build

      - name: 准备空创世状态资源目录
        shell: bash
        run: |
          # 中文注释：安装包只携带节点软件；首次启动按冻结 chainspec 本地初始化并联网同步。
          rm -rf citizenchain/node/resources/genesis-state

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Tauri 打包（push 检查）
        if: ${{ env.GMB_RELEASE_MODE != 'true' }}
        working-directory: citizenchain/node
        run: cargo tauri build --ci

      - name: Tauri 打包（手动发布）
        if: ${{ env.GMB_RELEASE_MODE == 'true' }}
        working-directory: citizenchain/node
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.GMB_TOP_KEY }}
        run: cargo tauri build --ci

      - name: 整理 Linux 产物
        if: matrix.platform == 'linux'
        shell: bash
        env:
          INSTALLER_NAME: ${{ matrix.installer_name }}
          UPDATER_ASSET_NAME: ${{ matrix.updater_asset_name }}
          EXPECTED_DEB_ARCH: ${{ matrix.deb_arch }}
        run: |
          set -euo pipefail
          mkdir -p citizenchain-release

          deb_file="$(find citizenchain/target/release/bundle/deb -name '*.deb' | head -1)"
          if [ -z "$deb_file" ]; then
            echo "::error::未找到 Linux deb 安装包。"
            exit 1
          fi
          actual_deb_arch="$(dpkg-deb -f "$deb_file" Architecture)"
          if [ "$actual_deb_arch" != "$EXPECTED_DEB_ARCH" ]; then
            echo "::error::deb 架构不符合 ${EXPECTED_DEB_ARCH}: 当前为 ${actual_deb_arch}"
            exit 1
          fi
          cp "$deb_file" "citizenchain-release/${INSTALLER_NAME}"

          appimage_file=""
          if [ -d citizenchain/target/release/bundle/appimage ]; then
            appimage_file="$(find citizenchain/target/release/bundle/appimage -name '*.AppImage' | head -1)"
          fi

          if [ "${GMB_RELEASE_MODE}" = "true" ]; then
            if [ -z "$appimage_file" ]; then
              echo "::error::手动发布缺少 Linux updater AppImage。"
              exit 1
            fi
            appimage_sig="${appimage_file}.sig"
            if [ ! -f "$appimage_sig" ]; then
              echo "::error::手动发布缺少 Linux updater 签名: $appimage_sig"
              exit 1
            fi
            cp "$appimage_file" "citizenchain-release/${UPDATER_ASSET_NAME}"
            cp "$appimage_sig" "citizenchain-release/${UPDATER_ASSET_NAME}.sig"
          fi

          ls -lh citizenchain-release

      - name: 整理 macOS 产物
        if: matrix.platform == 'macos'
        shell: bash
        env:
          INSTALLER_NAME: ${{ matrix.installer_name }}
          UPDATER_ASSET_NAME: ${{ matrix.updater_asset_name }}
        run: |
          set -euo pipefail
          mkdir -p citizenchain-release

          dmg_file="$(find citizenchain/target/release/bundle/dmg -name '*.dmg' | head -1)"
          if [ -z "$dmg_file" ]; then
            echo "::error::未找到 macOS dmg 安装包。"
            exit 1
          fi
          cp "$dmg_file" "citizenchain-release/${INSTALLER_NAME}"

          if [ "${GMB_RELEASE_MODE}" = "true" ]; then
            updater_file="$(find citizenchain/target/release/bundle/macos -name '*.app.tar.gz' | head -1)"
            if [ -z "$updater_file" ]; then
              echo "::error::手动发布缺少 macOS updater 归档。"
              exit 1
            fi
            updater_sig="${updater_file}.sig"
            if [ ! -f "$updater_sig" ]; then
              echo "::error::手动发布缺少 macOS updater 签名: $updater_sig"
              exit 1
            fi
            cp "$updater_file" "citizenchain-release/${UPDATER_ASSET_NAME}"
            cp "$updater_sig" "citizenchain-release/${UPDATER_ASSET_NAME}.sig"
          fi

          ls -lh citizenchain-release

      - name: 整理 Windows 产物
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $installerName = "${{ matrix.installer_name }}"
          New-Item -ItemType Directory -Force citizenchain-release | Out-Null

          $exe = Get-ChildItem -Path "citizenchain/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          if ($null -eq $exe) {
            Write-Error "未找到 Windows exe 安装包。"
            exit 1
          }

          Copy-Item $exe.FullName (Join-Path "citizenchain-release" $installerName)
          if ($env:GMB_RELEASE_MODE -eq "true") {
            $sigPath = "$($exe.FullName).sig"
            if (-not (Test-Path $sigPath)) {
              Write-Error "手动发布缺少 Windows updater 签名: $sigPath"
              exit 1
            }
            Copy-Item $sigPath (Join-Path "citizenchain-release" "$installerName.sig")
          }
          Get-ChildItem citizenchain-release | Format-Table Name, Length

      - name: 上传桌面端产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: citizenchain-release/*
          retention-days: 30
          overwrite: true

  publish-github-release:
    name: 发布桌面端 GitHub Release
    needs: build-desktop
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'release' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取发布上下文
        uses: actions/checkout@v5

      - name: 下载四个安装包与 updater 产物
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: 发布到 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          # 中文注释:发布到唯一「滚动 Release」(固定 tag release,始终 Latest);版本号取源码 tauri.conf.json。
          tag="release"
          version="$(python3 -c "import json;print(json.load(open('citizenchain/node/tauri.conf.json'))['version'])")"
          title="GMB 正式版"
          notes="CitizenChain 桌面端 v${version}(滚动发布,始终 Latest);runtime WASM 走链上 setCode 协议升级。"

          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const root = 'release-artifacts';
          const repo = process.env.CURRENT_REPOSITORY;
          const version = JSON.parse(fs.readFileSync('citizenchain/node/tauri.conf.json', 'utf8')).version;
          const notes = `CitizenChain 桌面端 v${version}。`;

          function walk(dir) {
            return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
              const full = path.join(dir, entry.name);
              return entry.isDirectory() ? walk(full) : [full];
            });
          }

          const files = new Map(walk(root).map((file) => [path.basename(file), file]));
          const platforms = {};
          const requiredInstallers = [
            '公民链.dmg',
            '公民链.exe',
            '公民链AMD.deb',
            '公民链ARM.deb',
          ];

          for (const installer of requiredInstallers) {
            if (!files.has(installer)) {
              throw new Error(`缺少正式用户安装包: ${installer}`);
            }
          }

          function assetUrl(name) {
            return `https://github.com/${repo}/releases/latest/download/${encodeURIComponent(name)}`;
          }

          function addPlatform(platform, assetName) {
            const assetPath = files.get(assetName);
            const sigPath = files.get(`${assetName}.sig`);
            if (!assetPath || !sigPath) {
              throw new Error(`缺少 ${platform} updater 产物或签名: ${assetName}`);
            }
            platforms[platform] = {
              signature: fs.readFileSync(sigPath, 'utf8').trim(),
              url: assetUrl(assetName),
            };
          }

          addPlatform('linux-x86_64', 'citizenchain-updater-linux-amd.AppImage');
          addPlatform('linux-aarch64', 'citizenchain-updater-linux-arm.AppImage');
          addPlatform('windows-x86_64', '公民链.exe');
          addPlatform('darwin-aarch64', 'citizenchain-updater-macos-apple.app.tar.gz');

          fs.writeFileSync(
            path.join(root, 'citizenchain-latest.json'),
            `${JSON.stringify({
              version,
              notes,
              pub_date: new Date().toISOString(),
              platforms,
            }, null, 2)}\n`
          );
          NODE

          mapfile -t assets < <(find release-artifacts -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "::error::没有找到可发布的桌面端产物。"
            exit 1
          fi

          if gh release view "$tag" --repo "$CURRENT_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber --repo "$CURRENT_REPOSITORY"
            gh release edit "$tag" --latest --repo "$CURRENT_REPOSITORY"
          else
            gh release create "$tag" "${assets[@]}" --repo "$CURRENT_REPOSITORY" --target "$GITHUB_SHA" --title "$title" --notes "$notes" --latest
          fi
