name: CitizenChain CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/citizenchain-ci.yml"
      - "citizenchain/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/citizenchain-ci.yml"
      - "citizenchain/**"
  workflow_dispatch:

concurrency:
  group: citizenchain-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: 编译 node + nodeui
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
          components: rust-src

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: citizenchain/nodeui/frontend/package-lock.json

      - name: 安装 Linux 构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            llvm-dev \
            libclang-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            protobuf-compiler \
            libpam0g-dev

      - name: 配置 libclang 环境变量
        run: |
          echo "LLVM_CONFIG_PATH=$(command -v llvm-config)" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "citizenchain"
          workspaces: |
            citizenchain -> target
            citizenchain/nodeui -> target

      # ── node ──

      - name: 编译 node
        working-directory: citizenchain
        run: cargo build --release -p node

      - name: 运行 node 测试
        working-directory: citizenchain
        run: cargo test --release -p node

      - name: 上传 node 二进制
        uses: actions/upload-artifact@v4
        with:
          name: citizenchain-node-linux-amd64
          path: citizenchain/target/release/node
          retention-days: 30
          overwrite: true

      # ── nodeui（自动绑定 node：build.rs 编译 node 并复制到 sidecar）──

      - name: 安装前端依赖
        run: npm --prefix citizenchain/nodeui/frontend ci

      - name: 构建前端
        run: npm --prefix citizenchain/nodeui/frontend run build

      - name: 编译 nodeui backend
        run: cargo check --manifest-path citizenchain/nodeui/backend/Cargo.toml
