name: Wumin CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/wumin-ci.yml"
      - "wumin/**"
      - "citizenchain/runtime/src/lib.rs"
  workflow_dispatch:

concurrency:
  group: wumin-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: 构建 公民钱包.apk
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: 同步 runtime spec_version
        run: |
          SPEC=$(grep 'spec_version:' citizenchain/runtime/src/lib.rs | grep -o '[0-9]*')
          sed -i "s/supportedSpecVersions = {[^}]*}/supportedSpecVersions = {$SPEC}/" wumin/lib/signer/pallet_registry.dart
          echo "冷钱包 spec_version 已同步为 {$SPEC}"

      - name: 安装依赖
        working-directory: wumin
        run: flutter pub get

      - name: 恢复签名文件
        env:
          WUMIN_UPLOAD_KEYSTORE_BASE64: ${{ secrets.WUMIN_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          test -n "$WUMIN_UPLOAD_KEYSTORE_BASE64"
          printf '%s' "$WUMIN_UPLOAD_KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/wumin/android/wumin-release.jks"

      - name: 生成 key.properties
        working-directory: wumin/android
        env:
          WUMIN_KEYSTORE_PASSWORD: ${{ secrets.WUMIN_KEYSTORE_PASSWORD }}
          WUMIN_KEY_PASSWORD: ${{ secrets.WUMIN_KEY_PASSWORD }}
          WUMIN_KEY_ALIAS: ${{ secrets.WUMIN_KEY_ALIAS }}
        run: |
          test -n "$WUMIN_KEYSTORE_PASSWORD"
          test -n "$WUMIN_KEY_PASSWORD"
          test -n "$WUMIN_KEY_ALIAS"
          cat > key.properties <<EOF
          storePassword=$WUMIN_KEYSTORE_PASSWORD
          keyPassword=$WUMIN_KEY_PASSWORD
          keyAlias=$WUMIN_KEY_ALIAS
          storeFile=$GITHUB_WORKSPACE/wumin/android/wumin-release.jks
          EOF

      - name: 分析代码
        working-directory: wumin
        run: flutter analyze

      - name: 运行测试
        working-directory: wumin
        run: flutter test

      - name: 构建正式 APK
        working-directory: wumin
        run: flutter build apk --release

      - name: 重命名产物
        run: |
          cp wumin/build/app/outputs/flutter-apk/app-release.apk wumin/build/app/outputs/flutter-apk/公民钱包.apk
          echo "产出: 公民钱包.apk"

      - name: 上传 公民钱包.apk
        uses: actions/upload-artifact@v4
        with:
          name: 公民钱包
          path: wumin/build/app/outputs/flutter-apk/公民钱包.apk
          retention-days: 30
          overwrite: true
          if-no-files-found: error
