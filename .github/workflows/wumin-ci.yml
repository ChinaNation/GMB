name: Wumin CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/wumin-ci.yml"
      - "wumin/**"
      - "citizenchain/runtime/src/lib.rs"
      - "citizenchain/runtime/transaction/duoqian-transfer/src/lib.rs"
      - "citizenchain/runtime/governance/voting-engine/src/lib.rs"
  workflow_dispatch:

concurrency:
  group: wumin-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: 构建 公民钱包.apk
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: 同步 runtime spec_version 和 pallet 索引
        run: |
          RUNTIME_LIB=citizenchain/runtime/src/lib.rs
          REGISTRY=wumin/lib/signer/pallet_registry.dart
          TRANSFER_PALLET=citizenchain/runtime/transaction/duoqian-transfer/src/lib.rs
          VOTING_PALLET=citizenchain/runtime/governance/voting-engine/src/lib.rs

          SPEC=$(grep 'spec_version:' "$RUNTIME_LIB" | grep -o '[0-9]*')
          sed -i "s/supportedSpecVersions = {[^}]*}/supportedSpecVersions = {$SPEC}/" "$REGISTRY"

          BALANCES_IDX=$(grep -B1 'pub type Balances' "$RUNTIME_LIB" | grep -o 'pallet_index([0-9]*)' | grep -o '[0-9]*')
          DUOQIAN_IDX=$(grep -B1 'pub type DuoqianTransfer' "$RUNTIME_LIB" | grep -o 'pallet_index([0-9]*)' | grep -o '[0-9]*')
          VOTING_IDX=$(grep -B1 'pub type VotingEngine' "$RUNTIME_LIB" | grep -o 'pallet_index([0-9]*)' | grep -o '[0-9]*')

          sed -i "s/balancesPallet = [0-9]*/balancesPallet = $BALANCES_IDX/" "$REGISTRY"
          sed -i "s/duoqianTransferPallet = [0-9]*/duoqianTransferPallet = $DUOQIAN_IDX/" "$REGISTRY"
          sed -i "s/votingEnginePallet = [0-9]*/votingEnginePallet = $VOTING_IDX/" "$REGISTRY"

          # Step 2 · 离线聚合改造后 vote_transfer 已删除,冷钱包不盲签 finalize_X,本段只同步 propose_transfer
          PROPOSE_CALL=$(grep -B2 'fn propose_transfer' "$TRANSFER_PALLET" | grep -o 'call_index([0-9]*)' | grep -o '[0-9]*')
          JOINT_CALL=$(grep -B2 'fn joint_vote' "$VOTING_PALLET" | grep -o 'call_index([0-9]*)' | grep -o '[0-9]*')
          CITIZEN_CALL=$(grep -B2 'fn citizen_vote' "$VOTING_PALLET" | grep -o 'call_index([0-9]*)' | grep -o '[0-9]*')

          sed -i "s/proposeTransferCall = [0-9]*/proposeTransferCall = $PROPOSE_CALL/" "$REGISTRY"
          sed -i "s/jointVoteCall = [0-9]*/jointVoteCall = $JOINT_CALL/" "$REGISTRY"
          sed -i "s/citizenVoteCall = [0-9]*/citizenVoteCall = $CITIZEN_CALL/" "$REGISTRY"

          echo "spec_version={$SPEC} Balances=$BALANCES_IDX DuoqianTransfer=$DUOQIAN_IDX VotingEngine=$VOTING_IDX"
          echo "propose=$PROPOSE_CALL joint=$JOINT_CALL citizen=$CITIZEN_CALL"

      - name: 安装依赖
        working-directory: wumin
        run: flutter pub get

      - name: 恢复签名文件
        env:
          WUMIN_UPLOAD_KEYSTORE_BASE64: ${{ secrets.WUMIN_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          test -n "$WUMIN_UPLOAD_KEYSTORE_BASE64"
          printf '%s' "$WUMIN_UPLOAD_KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/wumin/android/wumin-ci.jks"

      - name: 生成 key.properties
        working-directory: wumin/android
        env:
          WUMIN_KEYSTORE_PASSWORD: ${{ secrets.WUMIN_KEYSTORE_PASSWORD }}
          WUMIN_KEY_PASSWORD: ${{ secrets.WUMIN_KEY_PASSWORD }}
          WUMIN_KEY_ALIAS: ${{ secrets.WUMIN_KEY_ALIAS }}
        run: |
          test -n "$WUMIN_KEYSTORE_PASSWORD"
          test -n "$WUMIN_KEY_PASSWORD"
          test -n "$WUMIN_KEY_ALIAS"
          cat > key.properties <<EOF
          storePassword=$WUMIN_KEYSTORE_PASSWORD
          keyPassword=$WUMIN_KEY_PASSWORD
          keyAlias=$WUMIN_KEY_ALIAS
          storeFile=$GITHUB_WORKSPACE/wumin/android/wumin-ci.jks
          EOF

      - name: 分析代码
        working-directory: wumin
        run: flutter analyze --no-fatal-infos

      - name: 运行测试
        working-directory: wumin
        run: flutter test

      - name: 构建正式 APK
        working-directory: wumin
        run: flutter build apk --release

      - name: 重命名产物
        run: |
          cp wumin/build/app/outputs/flutter-apk/app-release.apk wumin/build/app/outputs/flutter-apk/公民钱包.apk
          echo "产出: 公民钱包.apk"

      - name: 上传 公民钱包.apk
        uses: actions/upload-artifact@v4
        with:
          name: 公民钱包
          path: wumin/build/app/outputs/flutter-apk/公民钱包.apk
          retention-days: 30
          overwrite: true
          if-no-files-found: error
