name: CitizenApp CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/citizenapp-ci.yml"
      - ".fvm/fvm_config.json"
      - "citizenapp/**"
      - "citizenapp/scripts/check-chainspec-frozen.sh"
      - "citizenchain/node/chainspecs/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/citizenapp-ci.yml"
      - ".fvm/fvm_config.json"
      - "citizenapp/**"
      - "citizenapp/scripts/check-chainspec-frozen.sh"
      - "citizenchain/node/chainspecs/**"
  workflow_dispatch:
    inputs:
      mode:
        description: 执行 CI 或正式发布
        required: true
        type: choice
        options:
          - ci
          - release

concurrency:
  group: citizenapp-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  GMB_RELEASE_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'release' }}

jobs:
  # ── 代码检查 ──
  check:
    name: Flutter 代码检查
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 校验 chainspec.json 冻结
        run: |
          if [ "${GMB_RELEASE_MODE}" = "true" ]; then
            export CITIZENAPP_REQUIRE_STATE_ROOT=1
          fi
          bash citizenapp/scripts/check-chainspec-frozen.sh

      - name: 读取 Flutter 版本
        id: flutter-version
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          version = json.loads(Path(".fvm/fvm_config.json").read_text(encoding="utf-8"))["flutterSdkVersion"]
          print(f"version={version}")
          PY

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter-version.outputs.version }}

      - name: 安装依赖
        working-directory: citizenapp
        run: flutter pub get

      - name: 分析代码
        working-directory: citizenapp
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: 运行测试
        working-directory: citizenapp
        # WalletIsar 测试模式磁盘 dir 在 systemTemp.path,实例名固定 'citizenapp'。
        # 默认 concurrency=CPU 核数,多个 isolate 并行打开同一磁盘 db 会
        # 互踩 unique index 触发 IsarError,顺序跑稳。
        run: flutter test --concurrency=1

  # ── Android APK 打包 ──
  android:
    name: 打包公民.apk
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: 读取 Flutter 版本
        id: flutter-version
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          version = json.loads(Path(".fvm/fvm_config.json").read_text(encoding="utf-8"))["flutterSdkVersion"]
          print(f"version={version}")
          PY

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter-version.outputs.version }}

      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Android SDK Platform 36
        run: sdkmanager "platforms;android-36"

      # chainspec.json 是从 plain SSOT + 创世状态包派生的 stateRootHash 轻形态。
      # runtime 升级走链上 system.setCode，不要重新 build-spec。
      # 详见 memory/07-ai/chainspec-frozen.md
      - name: 再次校验 chainspec.json 冻结
        run: |
          if [ "${GMB_RELEASE_MODE}" = "true" ]; then
            export CITIZENAPP_REQUIRE_STATE_ROOT=1
          fi
          bash citizenapp/scripts/check-chainspec-frozen.sh

      # 编译 smoldot Rust FFI 库（Android arm64-v8a + armeabi-v7a）
      - name: 编译 smoldot native library (Android ARM)
        working-directory: citizenapp
        run: ./scripts/build-smoldot-native.sh android

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "citizenapp-rust-android"
          workspaces: citizenapp/rust -> target

      - name: 安装 Flutter 依赖
        working-directory: citizenapp
        run: flutter pub get

      - name: 修复 isar_flutter_libs compileSdk
        run: |
          ISAR_GRADLE=$(find "$HOME/.pub-cache" -path "*/isar_flutter_libs*/android/build.gradle" | head -1)
          if [ -n "$ISAR_GRADLE" ]; then
            sed -i 's/compileSdkVersion 30/compileSdkVersion 36/' "$ISAR_GRADLE"
            echo "已将 isar_flutter_libs compileSdkVersion 30 → 36"
          fi

      # push / PR 只验证 Android 工程能构建，不读取正式签名密钥。
      # 只有 GitHub 页面手动 Run workflow 才生成可分发的正式签名 APK。
      - name: 写入 Android release keystore
        if: ${{ env.GMB_RELEASE_MODE == 'true' }}
        env:
          GMB_APP_KEY: ${{ secrets.GMB_APP_KEY }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          raw = os.environ.get("GMB_APP_KEY", "").strip()
          if not raw:
              raise SystemExit("手动发布缺少 GMB_APP_KEY secret。")

          props = {}
          for line in raw.splitlines():
              line = line.strip()
              if not line or line.startswith("#"):
                  continue
              if "=" not in line:
                  raise SystemExit("GMB_APP_KEY 每行必须使用 key=value 格式。")
              key, value = line.split("=", 1)
              props[key.strip()] = value.strip()

          keystore_b64 = props.get("keystore")
          password = props.get("password")
          alias = props.get("alias", "upload")
          key_password = props.get("keyPassword", password)
          if not keystore_b64 or not password:
              raise SystemExit("GMB_APP_KEY 必须包含 keystore=<base64后的jks> 和 password=<密码>。")

          workspace = Path(os.environ["GITHUB_WORKSPACE"])
          android_dir = workspace / "citizenapp" / "android"
          keystore_path = android_dir / "gmb-app-release.jks"
          keystore_path.write_bytes(base64.b64decode(keystore_b64))

          # 中文注释：两个移动端共用同一套 GMB_APP_KEY；alias 随现有 keystore 写入，key 密码默认复用 keystore 密码。
          (android_dir / "key.properties").write_text(
              "\n".join(
                  [
                      f"storeFile={keystore_path}",
                      f"storePassword={password}",
                      f"keyAlias={alias}",
                      f"keyPassword={key_password}",
                      "",
                  ]
              ),
              encoding="utf-8",
          )
          PY

      - name: 打包 Debug APK（push / PR 检查）
        if: ${{ env.GMB_RELEASE_MODE != 'true' }}
        working-directory: citizenapp
        run: flutter build apk --debug --target-platform android-arm,android-arm64

      - name: 打包正式签名 APK
        if: ${{ env.GMB_RELEASE_MODE == 'true' }}
        working-directory: citizenapp
        run: flutter build apk --release --target-platform android-arm,android-arm64

      - name: 重命名为公民.apk
        if: ${{ env.GMB_RELEASE_MODE == 'true' }}
        run: cp citizenapp/build/app/outputs/flutter-apk/app-release.apk citizenapp/build/app/outputs/flutter-apk/公民.apk

      - name: 生成 Android 更新清单
        if: ${{ env.GMB_RELEASE_MODE == 'true' }}
        run: |
          set -euo pipefail

          version_line="$(awk '/^version:/ {print $2; exit}' citizenapp/pubspec.yaml)"
          version_name="${version_line%%+*}"
          version_code="${version_line##*+}"
          apk_path="citizenapp/build/app/outputs/flutter-apk/公民.apk"
          apk_sha256="$(shasum -a 256 "$apk_path" | awk '{print $1}')"
          published_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          manifest_path="citizenapp/build/app/outputs/flutter-apk/citizenapp-android-update.json"

          cat > "$manifest_path" <<EOF
          {
            "app": "citizenapp",
            "platform": "android",
            "package_name": "org.citizenapp",
            "version_name": "$version_name",
            "version_code": $version_code,
            "apk_asset": "公民.apk",
            "apk_sha256": "$apk_sha256",
            "published_at": "$published_at",
            "notes": "citizenapp Android $version_name+$version_code"
          }
          EOF

      # 中文注释:发布到唯一「滚动 Release」(固定 tag release,始终 Latest);同仓库三产品共用,--clobber 只覆盖公民.apk 与其清单。
      - name: 发布到滚动 Release
        if: ${{ env.GMB_RELEASE_MODE == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="release"
          apk_path="citizenapp/build/app/outputs/flutter-apk/公民.apk"
          manifest_path="citizenapp/build/app/outputs/flutter-apk/citizenapp-android-update.json"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --latest >/dev/null
          else
            gh release create "$tag" \
              --title 'GMB 正式版' \
              --notes 'GMB 各产品最新正式版(滚动发布,始终 Latest)。' \
              --latest --target "$GITHUB_SHA"
          fi

          gh release upload "$tag" "$apk_path" "$manifest_path" --clobber

      # 只有 GitHub 页面手动运行时才维护 APK 产物。
      - name: 清理旧版 APK artifact
        if: ${{ env.GMB_RELEASE_MODE == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '.artifacts[] | select(.name == "公民.apk") | .id' \
          | while read -r id; do
              echo "删除旧 artifact: $id"
              gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id || true
            done

      - name: 上传公民.apk
        if: ${{ env.GMB_RELEASE_MODE == 'true' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: 公民.apk
          path: citizenapp/build/app/outputs/flutter-apk/公民.apk
          retention-days: 30

      - name: 上传 Android 更新清单
        if: ${{ env.GMB_RELEASE_MODE == 'true' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: citizenapp-android-update.json
          path: citizenapp/build/app/outputs/flutter-apk/citizenapp-android-update.json
          retention-days: 30
