name = "citizenapp-square-api"
main = "src/index.ts"
compatibility_date = "2026-07-05"
workers_dev = true

# 远端部署前必须把 database_id / kv id 替换为 Cloudflare 实际资源 ID。
# Cloudflare API token、R2 access key、R2 secret key、Stripe secret key、Stripe webhook secret、Stream webhook secret 不得写入本文件。
# CHAIN_URL 与两项 CHAIN_ID / CHAIN_SECRET 服务令牌必须分别使用 wrangler secret 配置，禁止写入 vars 或仓库。

[[r2_buckets]]
binding = "SQUARE_MEDIA"
bucket_name = "citizenapp-square-media"
preview_bucket_name = "citizenapp-square-media-dev"

[[d1_databases]]
binding = "DB"
database_name = "citizenapp-square-db"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "SQUARE_CACHE"
id = "00000000000000000000000000000000"
preview_id = "00000000000000000000000000000000"

[[durable_objects.bindings]]
name = "CHAT_REALTIME"
class_name = "ChatRealtimeObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRealtimeObject"]

# 退订视频冷归档扫描：每日一次（UTC 03:00）。是否真正归档由 ARCHIVE_ENABLED 开关控制。
[triggers]
crons = ["0 3 * * *"]

[vars]
SESSION_TTL_SECONDS = "86400"
UPLOAD_TTL_SECONDS = "900"
DEV_UPLOAD_PROXY = "0"
STRIPE_DEV_PROXY = "0"
ARCHIVE_ENABLED = "0"
ARCHIVE_LAPSE_DAYS = "90"
APNS_ENV = "production"
R2_BUCKET = "citizenapp-square-media"
# Stripe price id 不是密钥，可按官网订阅实际价格填入；webhook secret 必须用 wrangler secret 配置。
FREEDOM_PRICE_ID = ""
DEMOCRACY_PRICE_ID = ""
VOTING_PRICE_ID = ""
CANDIDATE_PRICE_ID = ""
CHECKOUT_SUCCESS_URL = ""
CHECKOUT_CANCEL_URL = ""
IMAGES_URL = ""
STREAM_URL = ""
BOOT_TTL_SECONDS = "300"
CHAIN_GENESIS_HASH = "0xb57c61a97f2b1fd7fa78756060a0c3e9a0ed6b1048bb8424b034a8f5f99a9971"
