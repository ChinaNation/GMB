RELAY_ENABLED = "0"
RELAY_MAX_BYTES = "65536"
RELAY_PER_MINUTE = "20"
CHAIN_BOOTNODES = """
/dns4/nrcgch.crcfrcn.com/tcp/30333/wss/p2p/12D3KooWHepcMGD3h9VC1XNWmrac3pXo63RimV5jhTU2nC2TLAyS
