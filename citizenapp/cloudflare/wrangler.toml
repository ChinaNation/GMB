name = "citizenapp-square-api"
main = "src/index.ts"
compatibility_date = "2026-07-05"
workers_dev = true

# 远端部署前必须把 database_id / kv id 替换为 Cloudflare 实际资源 ID。
# Cloudflare API token、R2 access key、R2 secret key、Stripe secret key、Stripe webhook secret、Stream webhook secret、生产链 RPC 不得写入本文件。

[[r2_buckets]]
binding = "SQUARE_MEDIA"
bucket_name = "citizenapp-square-media"
preview_bucket_name = "citizenapp-square-media-dev"

[[d1_databases]]
binding = "DB"
database_name = "citizenapp-square-db"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "FEED_CACHE"
id = "00000000000000000000000000000000"
preview_id = "00000000000000000000000000000000"

[[durable_objects.bindings]]
name = "CHAT_REALTIME"
class_name = "ChatRealtimeObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRealtimeObject"]

[vars]
SQUARE_SESSION_TTL_SECONDS = "86400"
SQUARE_UPLOAD_URL_TTL_SECONDS = "900"
SQUARE_DEV_UPLOAD_PROXY = "0"
STRIPE_DEV_CHECKOUT_PROXY = "0"
R2_BUCKET_NAME = "citizenapp-square-media"
# Stripe price id 不是密钥，可按官网订阅实际价格填入；webhook secret 必须用 wrangler secret 配置。
STRIPE_PRICE_VISITOR = ""
STRIPE_PRICE_VOTING = ""
STRIPE_PRICE_CANDIDATE = ""
CITIZENAPP_MEMBERSHIP_SUCCESS_URL = ""
CITIZENAPP_MEMBERSHIP_CANCEL_URL = ""
CLOUDFLARE_IMAGES_DELIVERY_BASE_URL = ""
