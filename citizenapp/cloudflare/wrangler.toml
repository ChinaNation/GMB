name = "citizenapp-square-api"
main = "src/index.ts"
compatibility_date = "2026-07-08"
workers_dev = false
preview_urls = false
stream = { binding = "STREAM" }

# 远端部署前必须把 database_id / kv id 替换为 Cloudflare 实际资源 ID。
# Cloudflare API token、R2 冷归档访问密钥、Stream webhook secret 不得写入本文件。
# 用户资料、清单和图片不取得 R2 写入授权；R2 密钥只允许服务端内部冷归档使用。
# CHAIN_URL 与两项 CHAIN_ID / CHAIN_SECRET 服务令牌必须分别使用 wrangler secret 配置，禁止写入 vars 或仓库。

[[r2_buckets]]
binding = "SQUARE_MEDIA"
bucket_name = "citizenapp-square-media"
preview_bucket_name = "citizenapp-square-media-dev"

# 大媒体(>100MB)瞬时中转专用桶:仅存薪火 + >100MB 的 E2E 密文,配 24h 生命周期 TTL。
# 部署前需创建该桶并设桶级 lifecycle(24h 过期删)。
[[r2_buckets]]
binding = "CHAT_RELAY"
bucket_name = "citizenapp-chat-relay"
preview_bucket_name = "citizenapp-chat-relay-dev"

[[d1_databases]]
binding = "DB"
database_name = "citizenapp-square-db"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "SQUARE_CACHE"
id = "00000000000000000000000000000000"
preview_id = "00000000000000000000000000000000"

[[durable_objects.bindings]]
name = "CHAT_REALTIME"
class_name = "ChatRealtimeObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRealtimeObject"]

# 广场发帖通知扇出队列：producer 入队一条发帖事件，consumer 分页跨调用把全部未静音粉丝推完。
[[queues.producers]]
binding = "SQUARE_NOTIFY_QUEUE"
queue = "square-notify-fanout"

[[queues.consumers]]
queue = "square-notify-fanout"
max_batch_size = 10
max_retries = 3

# 退订视频冷归档扫描：每日一次（UTC 03:00）。是否真正归档由 ARCHIVE_ENABLED 开关控制。
[triggers]
crons = ["*/5 * * * *", "0 3 * * *"]

[vars]
SESSION_TTL_SECONDS = "86400"
UPLOAD_TTL_SECONDS = "900"
ARCHIVE_ENABLED = "0"
ARCHIVE_LAPSE_DAYS = "90"
# 会员镜像对账默认（本地默认关；staging/production 开）。批量缺省 50、上限 500。
# 运行期以 KV 开关（flag:membership_reconcile / flag:creator_reconcile）优先，供控制台即时切。
MEMBERSHIP_RECONCILE_ENABLED = "0"
CREATOR_RECONCILE_ENABLED = "0"
MEMBERSHIP_RECONCILE_BATCH = "50"
APNS_ENV = "production"
R2_BUCKET = "citizenapp-square-media"
IMAGES_URL = ""
STREAM_URL = ""
MEDIA_TTL_SECONDS = "300"
WEB_ORIGIN = "https://www.crcfrcn.com"
TURNSTILE_SITEKEY = "0x4AAAAAAD0GQRiB2O3a0DYJ"
# 稳定币充值(topup)：沙箱期用 testnet；收款地址/合约/RPC 部署时填。
# TOPUP_SETTLE_TOKEN 是结算令牌，必须用 wrangler secret 配置，不写入本文件。
# staging/production 的 vars 需在推广时镜像这几项；未配置时 topup 接口 fail-closed 返回 503。
TOPUP_NETWORK = "testnet"
TOPUP_RECV_ADDRESS = ""
TOPUP_BASE_RPC_URL = ""
TOPUP_ARBITRUM_RPC_URL = ""
TOPUP_USDC_CONTRACT = ""
TOPUP_USDT_CONTRACT = ""
TOPUP_MIN_CONFIRMATIONS = "0"
BOOT_TTL_SECONDS = "300"
CHAIN_GENESIS_HASH = "0x840d5b12c541a010783e54069c9168a13d102ba63cd8f3a00263440c1803aad9"
CHAIN_STATE_ROOT = "0x99b4cb3031baa5e87536a22190dc81bf6bf49d3678c0abae86a312268506fe09"
RELAY_ENABLED = "0"
RELAY_MAX_BYTES = "65536"
RELAY_PER_MINUTE = "20"
CHAIN_BOOTNODES = """
/dns4/nrcgch.crcfrcn.com/tcp/30333/wss/p2p/12D3KooWHepcMGD3h9VC1XNWmrac3pXo63RimV5jhTU2nC2TLAyS
/dns4/prczss.crcfrcn.com/tcp/30333/wss/p2p/12D3KooWPjWNXvCzPv6PPuiGnF3J5uToW3ySfaB7rKkwUrN2CALv
