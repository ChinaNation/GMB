name: citizenapp
description: CitizenApp light-node mobile client built with Flutter.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.2
  polkadart: ^0.7.0
  polkadart_keyring: ^0.7.0
  bip39: ^1.0.6
  bip39_mnemonic: ^3.0.10
  mobile_scanner: ^7.1.4
  qr: ^3.0.2
  qr_flutter: ^4.1.0
  flutter_svg: ^2.0.10+1
  local_auth: ^2.3.0
  flutter_secure_storage: ^10.3.1
  image_picker: ^1.1.2
  crypto: ^3.0.3
  # 切换为仓库内本地 fork，后续 Dart FFI 能力扩展随主仓库一起演进。
  smoldot:
    path: smoldotdart
  # isar 3.1 上游已停更且预编译 .so 未 16KB 对齐;改用社区维护分支 isar_community
  # (沿用 isar 3.x API 与 DB 格式,不迁移数据;libisar.so 已 16KB 对齐)。
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  path_provider: ^2.1.4
  saver_gallery: ^4.1.0
  file_picker: ^8.0.0
  sr25519: ^0.7.0
  substrate_bip39: ^0.7.0
  protobuf: ^6.0.0
  ffi: ^2.2.0
  path: ^1.9.1
  fixnum: ^1.1.1
  flutter_chat_ui: ^2.11.1
  flutter_chat_core: ^2.9.0
  cryptography: ^2.9.0
  url_launcher: ^6.3.1
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter_webrtc: ^1.5.2
  webview_flutter: ^4.13.0
  video_player: ^2.10.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  isar_community_generator: ^3.3.2
  protoc_plugin: ^25.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/profile_defaults/
    - assets/badges/
    - assets/chainspec.json
    - assets/light_sync_state.json
    - assets/public_institutions/
    - assets/admin_divisions/
    - assets/admin_divisions/cities/
    - assets/admin_divisions/towns/
    - assets/icons/scan-line.svg
    - assets/icons/wallet.svg
    - assets/icons/copy.svg
    - assets/icons/arrow-right-left.svg
    - assets/icons/file-user.svg
    - assets/icons/message-square-text.svg
    - assets/icons/scale.svg
    - assets/icons/tank.svg
    - assets/icons/contact-round.svg
    - assets/icons/download.svg
    - assets/icons/government-line.svg
    - assets/icons/bank.svg
    - assets/icons/icons8-96.png
    - assets/icons/icons8-64.png
