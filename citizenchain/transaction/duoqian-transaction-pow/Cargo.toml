[package]
name = "duoqian-transaction-pow"  # 多签名链上交易模块
edition.workspace = true
version.workspace = true
authors.workspace = true
repository.workspace = true
license = "MIT"

[dependencies]
codec = { workspace = true }
scale-info = { workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
frame-benchmarking = { workspace = true, optional = true }
sp-core = { workspace = true, optional = true }
sp-io = { workspace = true, optional = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }
blake3 = { version = "1.8.3", default-features = false }
rand_core = { version = "0.6.4", default-features = false, optional = true }
schnorrkel = { version = "0.11.5", default-features = false, optional = true }
sfid-code-auth = { path = "../../otherpallet/sfid-code-auth", default-features = false, optional = true }

[features]
default = ["std"]
runtime-benchmarks = [
    "frame-benchmarking/runtime-benchmarks",
    "frame-support/runtime-benchmarks",
    "frame-system/runtime-benchmarks",
    "sp-core",
    "sp-io",
    "rand_core",
    "schnorrkel",
    "sfid-code-auth",
]
try-runtime = []
std = [
    "codec/std",
    "scale-info/std",
    "frame-benchmarking?/std",
    "frame-support/std",
    "frame-system/std",
    "sp-core?/std",
    "sp-io?/std",
    "rand_core?/std",
    "sp-runtime/std",
    "sp-std/std",
    "blake3/std",
    "schnorrkel?/std",
    "sfid-code-auth?/std",
]

[dev-dependencies]
pallet-balances = { workspace = true, default-features = true }
sp-core = { workspace = true, default-features = true }
sp-io = { workspace = true, default-features = true }
