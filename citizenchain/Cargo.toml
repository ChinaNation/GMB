[workspace]                                  # 公民币区块链主体的子工作空间
members = [
    "node",                                  # 链节点程序
    "node/vendor",                           # 本地覆盖的 GRANDPA voter 持久化实现
    "runtime",                               # 链上运行时
    "runtime/primitives",                    # 运行时共享常量与基础类型

    "runtime/governance/admins-change",       # 治理-管理员权限治理模块 pallet
    "runtime/governance/grandpakey-change",         # 治理-GRANDPA 密钥治理模块 pallet
    "runtime/governance/resolution-destro",   # 治理-决议销毁模块 pallet
    "runtime/governance/runtime-upgrade",    # 治理-运行时状态升级与超级管理员模块 pallet
    "runtime/governance/voting-engine",    # 治理-投票引擎模块 pallet

    "runtime/issuance/citizen-issuance", # 发行-公民发行模块 pallet
    "runtime/issuance/fullnode-issuance",        # 发行-全节点发行模块 pallet
    "runtime/issuance/resolution-issuance",        # 发行-决议发行完整流程模块 pallet
    "runtime/issuance/shengbank-interest",   # 发行-省储行利息模块 pallet
    "runtime/otherpallet/sfid-system",          # 其他-SFID 绑定与资格校验模块 pallet
    "runtime/otherpallet/pow-difficulty",   # 其他-PoW 动态难度调整模块 pallet
    "runtime/genesis",                           # 创世模块 pallet

    "runtime/transaction/offchain-transaction", # 交易-链下交易手续费模块 pallet
    "runtime/transaction/onchain-transaction",  # 交易-链上交易手续费模块 pallet
    "runtime/transaction/duoqian-manage",  # 交易-多签交易模块 pallet
    "runtime/transaction/duoqian-transfer",     # 交易-机构多签名地址转账模块 pallet
    "runtime/transaction/institution-asset",  # 交易-机构账户资金白名单公共模块

]
resolver = "2"

[workspace.package]                                         # 子工作空间元信息
edition = "2021"
version = "1.0.0"
authors = ["voyager_rhett <chinanation@icloud.com>"]
repository = "https://github.com/ChinaNation/GMB"
homepage = "https://github.com/ChinaNation/GMB"
license = "MIT"

[workspace.lints.rust]                                      # 统一 Rust lint 规则
unsafe_code = "warn"

[workspace.lints.clippy]                                    # 统一 Clippy lint 规则（阶段1：先收紧到 warn）
all = "warn"
unwrap_used = "warn"
expect_used = "warn"
dbg_macro = "warn"
todo = "warn"

[workspace.dependencies]
# 本地
citizenchain = { path = "runtime" }

# 工具
codec      = { package = "parity-scale-codec", version = "3.6.1", default-features = false, features = ["derive"] }
scale-info = { version = "2.10.0", default-features = false, features = ["derive"] }
serde      = { version = "1.0.197", default-features = false, features = ["derive", "alloc"] }
serde_json = { version = "1.0.114", default-features = false, features = ["alloc"] }
clap       = { version = "4.5.3", features = ["derive"] }
futures    = { version = "0.3.30", features = ["thread-pool"] }
futures-timer = { version = "3.0.2" }
jsonrpsee  = { version = "0.24.2", features = ["server"] }
arrayvec   = { version = "0.7.6", default-features = false }
array-bytes = { version = "6.2.2", default-features = false }
ahash = { version = "0.8.2" }
assert_matches = { version = "1.5.0" }
async-trait = { version = "0.1.88" }
dyn-clone = { version = "1.0.16" }
finality-grandpa = { version = "0.16.3", default-features = false }
log = { version = "0.4.22", default-features = false }
parking_lot = { version = "0.12.1", default-features = false }
rand = { version = "0.8.5", default-features = false }
thiserror = { version = "1.0.64" }
tokio = { version = "1.45.0", default-features = false }

# SDK 核心零件 (统一使用 stable2512)
