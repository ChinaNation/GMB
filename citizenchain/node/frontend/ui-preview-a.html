<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>UI 方案 A — 深蓝科技风</title>
<style>
* { box-sizing: border-box; margin: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0b1121; color: #e2e8f0; }

.page { width: 1360px; height: 920px; margin: 0 auto; padding: 0; display: flex; flex-direction: column; }

/* 顶部导航 */
.top-nav {
  display: flex; gap: 4px; padding: 12px 24px;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  border-bottom: 1px solid #334155;
}
.top-nav button {
  background: transparent; border: none; color: #94a3b8; font-size: 14px;
  padding: 8px 18px; border-radius: 8px; cursor: pointer; font-weight: 500;
  transition: all 0.2s;
}
.top-nav button:hover { color: #e2e8f0; background: rgba(255,255,255,0.05); }
.top-nav button.active {
  color: #fff; background: linear-gradient(135deg, #0891b2, #06b6d4);
  box-shadow: 0 2px 8px rgba(6, 182, 212, 0.3);
}
.top-nav .spacer { flex: 1; }
.top-nav .status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #94a3b8; }
.top-nav .status .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 6px #22c55e; }

/* 内容区 */
.app { flex: 1; padding: 24px; background: #0f172a; overflow-y: auto; }

.content { display: grid; gap: 16px; }

/* 状态行 */
.status-bar {
  display: flex; align-items: center; gap: 12px; padding: 14px 18px;
  background: linear-gradient(135deg, #1e293b, #0f172a);
  border: 1px solid #334155; border-radius: 12px;
}
.status-bar .dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.4); }
.status-bar .label { font-size: 14px; color: #22c55e; font-weight: 600; }
.status-bar .spacer { flex: 1; }
.status-bar .block { font-size: 13px; color: #64748b; }
.status-bar .block span { color: #06b6d4; font-weight: 600; font-size: 15px; }

.actions { display: flex; gap: 10px; }
.actions button {
  padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none;
}
.btn-start { background: linear-gradient(135deg, #0891b2, #06b6d4); color: #fff; }
.btn-stop { background: #1e293b; color: #94a3b8; border: 1px solid #334155 !important; }

/* 卡片网格 */
.card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.card {
  padding: 18px; border-radius: 12px;
  background: linear-gradient(145deg, #1e293b 0%, #162033 100%);
  border: 1px solid #334155;
}
.card .card-label { font-size: 12px; color: #64748b; margin-bottom: 6px; }
.card .card-value { font-size: 20px; font-weight: 700; color: #f1f5f9; }
.card .card-value.cyan { color: #06b6d4; }
.card .card-value.green { color: #22c55e; }

/* 信息区 */
.info-section { margin-top: 4px; }
.info-section h3 { font-size: 14px; color: #64748b; margin-bottom: 10px; font-weight: 600; }
.info-row {
  display: flex; justify-content: space-between; padding: 10px 16px;
  background: #1e293b; border: 1px solid #334155; border-radius: 10px; margin-bottom: 6px;
}
.info-row .label { font-size: 13px; color: #94a3b8; }
.info-row .value { font-size: 13px; color: #e2e8f0; font-family: 'SF Mono', monospace; }

/* 底部状态栏 */
.bottom-bar {
  display: flex; gap: 24px; padding: 10px 24px;
  background: #0b1121; border-top: 1px solid #1e293b; font-size: 12px; color: #475569;
}
.bottom-bar span { display: flex; align-items: center; gap: 6px; }
.bottom-bar .val { color: #94a3b8; font-family: monospace; }
</style>
</head>
<body>
<div class="page">
  <nav class="top-nav">
    <button class="active">首页</button>
    <button>挖矿</button>
    <button>治理</button>
    <button>网络</button>
    <button>白皮书</button>
    <button>公民宪法</button>
    <button>设置</button>
    <div class="spacer"></div>
    <div class="status"><span class="dot"></span> 运行中</div>
  </nav>

  <main class="app">
    <div class="content">
      <div class="status-bar">
        <span class="dot"></span>
        <span class="label">节点运行中</span>
        <span class="spacer"></span>
        <span class="block">区块高度 <span>#35</span></span>
        <span style="margin: 0 12px; color: #334155;">|</span>
        <span class="block">最终确认 <span>#33</span></span>
        <span style="margin-left: 16px;">
          <span class="actions">
            <button class="btn-start">启动节点</button>
            <button class="btn-stop">停止节点</button>
          </span>
        </span>
      </div>

      <div class="card-grid">
        <div class="card">
          <div class="card-label">总发行量</div>
          <div class="card-value cyan">1,000.00 GMB</div>
        </div>
        <div class="card">
          <div class="card-label">永久质押</div>
          <div class="card-value">500.00 GMB</div>
        </div>
        <div class="card">
          <div class="card-label">同步状态</div>
          <div class="card-value green">已同步</div>
        </div>
        <div class="card">
          <div class="card-label">今日挖矿收益</div>
          <div class="card-value cyan">12.50 GMB</div>
        </div>
      </div>

      <div class="info-section">
        <h3>节点身份</h3>
        <div class="info-row">
          <span class="label">节点名称</span>
          <span class="value">node-01</span>
        </div>
        <div class="info-row">
          <span class="label">节点角色</span>
          <span class="value">验证者</span>
        </div>
        <div class="info-row">
          <span class="label">PeerId</span>
          <span class="value">12D3KooWRk...7xPz</span>
        </div>
      </div>
    </div>
  </main>

  <div class="bottom-bar">
    <span>Runtime <span class="val">spec 4</span></span>
    <span>节点 <span class="val">v1.0.0</span></span>
    <span>网络 <span class="val">3 个节点在线</span></span>
  </div>
</div>
</body>
</html>
