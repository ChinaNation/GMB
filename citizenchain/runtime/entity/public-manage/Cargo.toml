[package]
name = "public-manage"  # 公权机构生命周期模块
edition.workspace = true
version.workspace = true
authors.workspace = true
repository.workspace = true
license = "MIT"

[dependencies]
codec = { workspace = true }
scale-info = { workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
frame-benchmarking = { workspace = true, optional = true }
sp-core = { workspace = true }
sp-io = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }
admin-primitives = { path = "../../admins/admin-primitives", default-features = false }
votingengine = { path = "../../votingengine", default-features = false }
institution-asset = { path = "../../transaction/institution-asset", default-features = false }
onchain = { path = "../../transaction/onchain", default-features = false }
primitives = { path = "../../primitives", default-features = false }
entity-primitives = { path = "../entity-primitives", default-features = false }

[features]
default = ["std"]
runtime-benchmarks = [
    "frame-benchmarking/runtime-benchmarks",
    "frame-support/runtime-benchmarks",
    "frame-system/runtime-benchmarks",
]
try-runtime = []
std = [
    "codec/std",
    "scale-info/std",
    "frame-benchmarking?/std",
    "frame-support/std",
    "frame-system/std",
    "sp-core/std",
    "sp-io/std",
    "sp-runtime/std",
    "sp-std/std",
    "admin-primitives/std",
    "votingengine/std",
    "institution-asset/std",
    "onchain/std",
    "primitives/std",
    "entity-primitives/std",
]

[dev-dependencies]
pallet-balances = { workspace = true, default-features = true }
sp-core = { workspace = true, default-features = true }
sp-io = { workspace = true, default-features = true }
internal-vote = { path = "../../votingengine/internal-vote", default-features = false }
public-admins = { path = "../../admins/public-admins", default-features = true }
private-admins = { path = "../../admins/private-admins", default-features = true }
