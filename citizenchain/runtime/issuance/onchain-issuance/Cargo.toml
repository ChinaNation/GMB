[package]
name = "onchain-issuance"  # 链上发行代币模块(Plain FT)
edition.workspace = true
version.workspace = true
authors.workspace = true
repository.workspace = true
license = "MIT"

[dependencies]
codec = { workspace = true }
scale-info = { workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
frame-benchmarking = { workspace = true, optional = true }
pallet-balances = { workspace = true }
pallet-assets = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }
sp-io = { workspace = true }
votingengine = { path = "../../votingengine", default-features = false }
primitives = { path = "../../primitives", default-features = false }
entity-primitives = { path = "../../entity/entity-primitives", default-features = false }

[features]
default = ["std"]
std = [
    "codec/std",
    "scale-info/std",
    "frame-benchmarking?/std",
    "frame-support/std",
    "frame-system/std",
    "pallet-balances/std",
    "pallet-assets/std",
    "sp-runtime/std",
    "sp-std/std",
    "sp-io/std",
    "votingengine/std",
    "primitives/std",
    "entity-primitives/std",
]
runtime-benchmarks = [
    # onchain-issuance benchmark 依赖 votingengine + balances + assets 的 benchmark 配置,需同步传播。
    "frame-benchmarking/runtime-benchmarks",
    "frame-support/runtime-benchmarks",
    "frame-system/runtime-benchmarks",
    "pallet-balances/runtime-benchmarks",
    "pallet-assets/runtime-benchmarks",
    "votingengine/runtime-benchmarks",
]
try-runtime = [
    # try-runtime feature 必须传播给所有 frame / pallet 依赖,
    # 否则 root runtime 启用 try-runtime 时编译会失败(ADR-011 v2 修订项 #6)。
    "frame-support/try-runtime",
    "frame-system/try-runtime",
    "pallet-balances/try-runtime",
    "pallet-assets/try-runtime",
    "votingengine/try-runtime",
    "sp-runtime/try-runtime",
]

[dev-dependencies]
internal-vote = { path = "../../votingengine/internal-vote", default-features = false }
joint-vote = { path = "../../votingengine/joint-vote", default-features = false }
