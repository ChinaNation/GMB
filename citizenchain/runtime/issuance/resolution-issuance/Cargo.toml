[package]
name = "resolution-issuance" # 决议发行完整流程模块
edition.workspace = true
version.workspace = true
authors.workspace = true
repository.workspace = true
license = "MIT"

[dependencies]
codec = { workspace = true }
scale-info = { workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
frame-benchmarking = { workspace = true, optional = true }
pallet-balances = { workspace = true }
sp-runtime = { workspace = true }
sp-io = { workspace = true }
sp-std = { workspace = true }
voting-engine = { path = "../../governance/voting-engine", default-features = false }
primitives = { path = "../../primitives", default-features = false }

[features]
default = ["std"]
std = [
    "codec/std",
    "scale-info/std",
    "frame-benchmarking?/std",
    "frame-support/std",
    "frame-system/std",
    "pallet-balances/std",
    "sp-runtime/std",
    "sp-io/std",
    "sp-std/std",
    "voting-engine/std",
    "primitives/std",
]
runtime-benchmarks = [
    # 中文注释：决议发行 benchmark 依赖 voting-engine 与 balances 的 benchmark 配置，需同步传播。
    "frame-benchmarking/runtime-benchmarks",
    "frame-support/runtime-benchmarks",
    "frame-system/runtime-benchmarks",
    "pallet-balances/runtime-benchmarks",
    "voting-engine/runtime-benchmarks",
]
try-runtime = []
