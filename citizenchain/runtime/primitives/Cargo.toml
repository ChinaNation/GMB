[package]
name = "primitives"        # 全局常量模块
edition.workspace = true   # 默认 Rust 版本
version.workspace = true   # 版本号
authors.workspace = true   # 作者
repository.workspace = true  #项目仓库
license = "MIT"              # 授权协议 MIT

[dependencies]
# SCALE 编解码
codec = { workspace = true, default-features = false, features = ["derive"] }
scale-info = { workspace = true, default-features = false, features = ["derive"] }
hex-literal = "0.4"
sp-api = { workspace = true }

# Substrate primitives —— 你现在就用到了
 sp-core = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }
frame-support = { workspace = true }

# 仅金标导出/断言集成测试使用(tests/account_derive_golden.rs),需 std。
[dev-dependencies]
serde_json = { workspace = true, default-features = false, features = ["std"] }

[features]
default = ["std"]

std = [
    "codec/std",
    "scale-info/std",
    "sp-api/std",
    "sp-core/std",
    "sp-runtime/std",
    "sp-std/std",
    "frame-support/std",
]
