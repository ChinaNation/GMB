[package]
name = "multisig-transfer"  # 多签名地址转账模块
edition.workspace = true
version.workspace = true
authors.workspace = true
repository.workspace = true
license = "MIT"

[dependencies]
codec = { workspace = true }
scale-info = { workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
frame-benchmarking = { workspace = true, optional = true }
pallet-balances = { workspace = true }
sp-core = { workspace = true }
sp-runtime = { workspace = true }
sp-io = { workspace = true }

primitives = { path = "../../primitives", default-features = false }
votingengine = { path = "../../votingengine", default-features = false }
organization-manage = { path = "../../private/organization-manage", default-features = false }
personal-manage = { path = "../../private/personal-manage", default-features = false }
onchain-transaction = { path = "../onchain-transaction", default-features = false }
institution-asset = { path = "../institution-asset", default-features = false }

[features]
default = ["std"]
std = [
    "codec/std",
    "scale-info/std",
    "frame-benchmarking?/std",
    "frame-support/std",
    "frame-system/std",
    "pallet-balances/std",
    "sp-core/std",
    "sp-runtime/std",
    "sp-io/std",
    "primitives/std",
    "votingengine/std",
    "organization-manage/std",
    "personal-manage/std",
    "onchain-transaction/std",
    "institution-asset/std",
]
runtime-benchmarks = [
    "frame-benchmarking/runtime-benchmarks",
    "frame-support/runtime-benchmarks",
    "frame-system/runtime-benchmarks",
]
try-runtime = []

[dev-dependencies]
admin-primitives = { path = "../../admins/admin-primitives", default-features = true }
public-admins = { path = "../../admins/public-admins", default-features = true }
private-admins = { path = "../../admins/private-admins", default-features = true }
personal-admins = { path = "../../admins/personal-admins", default-features = true }
internal-vote = { path = "../../votingengine/internal-vote", default-features = false }
