[package]
name = "duoqian-manage-pow"  # 多签名账户注册模块
edition.workspace = true
version.workspace = true
authors.workspace = true
repository.workspace = true
license = "MIT"

[dependencies]
codec = { workspace = true }
scale-info = { workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
frame-benchmarking = { workspace = true, optional = true }
sp-core = { workspace = true }
sp-io = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }
sfid-code-auth = { path = "../../otherpallet/sfid-code-auth", default-features = false }
admins-origin-gov = { path = "../../governance/admins-origin-gov", default-features = false }
voting-engine-system = { path = "../../governance/voting-engine-system", default-features = false }
institution-asset-guard = { path = "../institution-asset-guard", default-features = false }
onchain-transaction-pow = { path = "../onchain-transaction-pow", default-features = false }
primitives = { path = "../../primitives", default-features = false }

[features]
default = ["std"]
runtime-benchmarks = [
    "frame-benchmarking/runtime-benchmarks",
    "frame-support/runtime-benchmarks",
    "frame-system/runtime-benchmarks",
    "sfid-code-auth/runtime-benchmarks",
]
try-runtime = []
std = [
    "codec/std",
    "scale-info/std",
    "frame-benchmarking?/std",
    "frame-support/std",
    "frame-system/std",
    "sp-core/std",
    "sp-io/std",
    "sp-runtime/std",
    "sp-std/std",
    "sfid-code-auth/std",
    "admins-origin-gov/std",
    "voting-engine-system/std",
    "institution-asset-guard/std",
    "onchain-transaction-pow/std",
    "primitives/std",
]

[dev-dependencies]
pallet-balances = { workspace = true, default-features = true }
sp-core = { workspace = true, default-features = true }
sp-io = { workspace = true, default-features = true }
