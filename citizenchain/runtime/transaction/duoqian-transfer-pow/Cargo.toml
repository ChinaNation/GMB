[package]
name = "duoqian-transfer-pow"  # 机构多签名地址转账模块
edition.workspace = true
version.workspace = true
authors.workspace = true
repository.workspace = true
license = "MIT"

[dependencies]
codec = { workspace = true }
scale-info = { workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
frame-benchmarking = { workspace = true, optional = true }
pallet-balances = { workspace = true }
sp-runtime = { workspace = true }
sp-io = { workspace = true }

primitives = { path = "../../primitives", default-features = false }
voting-engine-system = { path = "../../governance/voting-engine-system", default-features = false }
duoqian-manage-pow = { path = "../duoqian-manage-pow", default-features = false }
onchain-transaction-pow = { path = "../onchain-transaction-pow", default-features = false }
institution-asset-guard = { path = "../institution-asset-guard", default-features = false }

[features]
default = ["std"]
std = [
    "codec/std",
    "scale-info/std",
    "frame-benchmarking?/std",
    "frame-support/std",
    "frame-system/std",
    "pallet-balances/std",
    "sp-runtime/std",
    "sp-io/std",
    "primitives/std",
    "voting-engine-system/std",
    "duoqian-manage-pow/std",
    "onchain-transaction-pow/std",
    "institution-asset-guard/std",
]
runtime-benchmarks = [
    "frame-benchmarking/runtime-benchmarks",
    "frame-support/runtime-benchmarks",
    "frame-system/runtime-benchmarks",
]
try-runtime = []
