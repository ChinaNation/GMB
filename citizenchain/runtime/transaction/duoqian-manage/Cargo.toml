[package]
name = "duoqian-manage"  # 多签名账户注册模块
edition.workspace = true
version.workspace = true
authors.workspace = true
repository.workspace = true
license = "MIT"

[dependencies]
codec = { workspace = true }
scale-info = { workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
frame-benchmarking = { workspace = true, optional = true }
sp-core = { workspace = true }
sp-io = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }
sfid-system = { path = "../../otherpallet/sfid-system", default-features = false }
admins-change = { path = "../../governance/admins-change", default-features = false }
voting-engine = { path = "../../governance/voting-engine", default-features = false }
institution-asset = { path = "../institution-asset", default-features = false }
onchain-transaction = { path = "../onchain-transaction", default-features = false }
primitives = { path = "../../primitives", default-features = false }

[features]
default = ["std"]
runtime-benchmarks = [
    "frame-benchmarking/runtime-benchmarks",
    "frame-support/runtime-benchmarks",
    "frame-system/runtime-benchmarks",
    "sfid-system/runtime-benchmarks",
]
try-runtime = []
std = [
    "codec/std",
    "scale-info/std",
    "frame-benchmarking?/std",
    "frame-support/std",
    "frame-system/std",
    "sp-core/std",
    "sp-io/std",
    "sp-runtime/std",
    "sp-std/std",
    "sfid-system/std",
    "admins-change/std",
    "voting-engine/std",
    "institution-asset/std",
    "onchain-transaction/std",
    "primitives/std",
]

[dev-dependencies]
pallet-balances = { workspace = true, default-features = true }
sp-core = { workspace = true, default-features = true }
sp-io = { workspace = true, default-features = true }
