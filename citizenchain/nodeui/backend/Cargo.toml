[package]
name = "nodeui-desktop-shell"
version = "0.1.0"
description = "NodeUI desktop shell"
authors = ["voyager_rhett <chinanation@icloud.com>"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
libc = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bs58 = "0.5"
blake2 = "0.10"
libp2p-identity = { version = "0.2", features = ["secp256k1", "peerid"] }
hex = "0.4"
twox-hash = "2"
ed25519-dalek = "2"
keyring = "3"
aes-gcm = "0.10"
pbkdf2 = "0.12"
sha2 = "0.10"
rand = "0.8"
base64 = "0.22"
subxt = { version = "0.43.1", default-features = false, features = ["jsonrpsee", "native"] }
subxt-signer = { version = "0.43.0", default-features = false, features = ["sr25519", "subxt"] }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
