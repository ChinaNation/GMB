[package]
name = "nodeui-desktop-shell"
version = "0.1.0"
description = "NodeUI desktop shell"
authors = ["voyager_rhett <chinanation@icloud.com>"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
libc = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bs58 = "0.5"
blake2b_simd = "1"
libp2p-identity = { version = "0.2", features = ["ed25519", "peerid"] }
hex = "0.4"
twox-hash = "2"
ed25519-dalek = "2"
sha2 = "0.10"
rand = "0.8"
primitives = { path = "../../runtime/primitives" } # 指向当前 citizenchain/runtime/primitives 统一共享常量目录
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
sysinfo = "0.34"
thiserror = "2"
unicode-normalization = "0.1"
zeroize = "1"
tokio = { version = "1", features = ["time"] }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
## 开发链模式：启动节点时传 --chain dev
dev-chain = []
