[package]
name = "nodeui-desktop-shell"
version = "0.1.0"
description = "NodeUI desktop shell"
authors = ["voyager_rhett <chinanation@icloud.com>"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
libc = "0.2"
serde = { version = "1", features = ["derive"] }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
