name: wuminapp_mobile
description: WuminApp light-node mobile client built with Flutter.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.2
  polkadart: ^0.7.0
  polkadart_keyring: ^0.7.0
  bip39: ^1.0.6
  bip39_mnemonic: ^3.0.10
  mobile_scanner: ^7.1.4
  qr: ^3.0.2
  qr_flutter: ^4.1.0
  flutter_svg: ^2.0.10+1
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  image_picker: ^1.1.2
  crypto: ^3.0.3
  # 中文注释：切换为仓库内本地 fork，后续 Dart FFI 能力扩展随主仓库一起演进。
  smoldot:
    path: smoldot-dart
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.4
  saver_gallery: ^4.1.0
  file_picker: ^8.0.0
  sr25519: ^0.7.0
  substrate_bip39: ^0.7.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  assets:
    - assets/chainspec.json
    - assets/light_sync_state.json
    - assets/icons/scan-line.svg
    - assets/icons/wallet.svg
    - assets/icons/copy.svg
    - assets/icons/arrow-right-left.svg
    - assets/icons/file-user.svg
    - assets/icons/message-square-text.svg
    - assets/icons/scale.svg
    - assets/icons/contact-round.svg
    - assets/icons/download.svg
    - assets/icons/icons8-96.png
    - assets/icons/icons8-64.png
