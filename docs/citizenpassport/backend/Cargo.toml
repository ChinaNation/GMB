[package]
name = "citizenpassport-backend"
version = "1.0.0"
edition = "2021"

# CPMS 后端源码已平铺到 backend 根目录,不再使用 Cargo 默认的 src/main.rs。
[[bin]]
name = "citizenpassport-backend"
path = "main.rs"

[workspace]

[dependencies]
axum = { version = "0.7", features = ["multipart"] }
tower-http = { version = "0.6", features = ["fs"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
blake2 = "0.10"
sha2 = "0.10"
schnorrkel = "0.11"
hex = "0.4"
base64 = "0.22"
rand = "0.8"
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "json"] }
bs58 = "0.5"
aes-gcm = "0.10"
# 行政区唯一源 china.sqlite 由 CID 维护,CPMS 安装期随附拷贝并用 rusqlite 只读。
rusqlite = { version = "0.32", features = ["bundled"] }
