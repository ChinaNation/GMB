<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>公民币区块链白皮书</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
  <style>
    :root {
      --bg: #f4f8fb;
      --bg-2: #e9eef4;
      --paper: #fffef9;
      --ink: #0f2233;
      --subtle: #5c6776;
      --line: #d8dee8;
      --accent: #0f766e;
      --accent-2: #0b6fc2;
      --soft-accent: #e8f4f2;
      --shadow: 0 16px 40px rgba(11, 44, 76, 0.12);
      --radius: 16px;
      --toc-width: 300px;
      --sticky-header-offset: 164px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Noto Sans SC", "PingFang SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 380px at 0% -10%, #d6ebf7 0%, transparent 70%),
        radial-gradient(760px 360px at 100% 0%, #dff3ec 0%, transparent 65%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
    }

    .hero {
      margin: 28px auto 20px;
      width: min(1240px, calc(100% - 32px));
      border: 1px solid #c5d9ec;
      border-radius: var(--radius);
      background:
        linear-gradient(120deg, rgba(15, 111, 194, 0.09), rgba(15, 118, 110, 0.08)),
        var(--paper);
      box-shadow: var(--shadow);
      padding: 24px 28px;
      position: sticky;
      top: 8px;
      z-index: 40;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -80px;
      top: -80px;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(15, 118, 110, 0.2), rgba(15, 118, 110, 0));
      pointer-events: none;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent-2);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .hero h1 {
      margin: 0;
      font-family: "ZCOOL XiaoWei", "Noto Sans SC", serif;
      font-weight: 400;
      font-size: clamp(30px, 4.4vw, 44px);
      color: #14324c;
      line-height: 1.2;
    }

    .layout {
      margin: 0 auto 26px;
      width: min(1240px, calc(100% - 32px));
      display: grid;
      grid-template-columns: var(--toc-width) minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    .toc {
      position: sticky;
      top: var(--sticky-header-offset);
      border-radius: var(--radius);
      border: 1px solid #cedae8;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(6px);
      box-shadow: var(--shadow);
      max-height: calc(100vh - var(--sticky-header-offset) - 12px);
      overflow: auto;
    }

    .toc h2 {
      margin: 0;
      padding: 14px 16px;
      font-size: 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #f8fcff, #f4f8fc);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .toc nav {
      padding: 8px;
      display: block;
    }

    .toc-node {
      margin: 2px 0;
    }

    .toc-children {
      margin: 2px 0 4px 14px;
      padding-left: 8px;
      border-left: 1px dashed #cfdae8;
      display: grid;
      gap: 2px;
    }

    .toc-node:not(.expanded) > .toc-children {
      display: none;
    }

    .toc-link {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      color: #305170;
      text-decoration: none;
      border-radius: 10px;
      padding: 8px 10px;
      line-height: 1.4;
      font-size: 13px;
      transition: background 120ms ease, color 120ms ease;
      border: 0;
      background: transparent;
      text-align: left;
      font-family: inherit;
      box-shadow: none;
    }

    .toc-link.level-2 {
      font-size: 12px;
    }

    .toc-link.level-3 {
      font-size: 12px;
      opacity: 0.9;
    }

    .toc-row.branch {
      cursor: pointer;
    }

    .toc-caret {
      width: 10px;
      flex: 0 0 10px;
      font-size: 11px;
      color: #52708d;
      transform: rotate(0deg);
      transition: transform 120ms ease;
    }

    .toc-row.leaf .toc-caret {
      visibility: hidden;
    }

    .toc-node.expanded > .toc-row.branch .toc-caret {
      transform: rotate(90deg);
    }

    .toc-text {
      min-width: 0;
      word-break: break-word;
    }

    .toc-link:hover {
      background: var(--soft-accent);
      color: #10443f;
    }

    .toc-link.active {
      background: var(--soft-accent);
      color: #10443f;
      font-weight: 700;
    }

    .paper {
      border-radius: var(--radius);
      border: 1px solid #cedae8;
      background: var(--paper);
      box-shadow: var(--shadow);
      min-height: 65vh;
    }

    .markdown-body {
      padding: clamp(20px, 4vw, 42px);
      font-size: 16px;
      line-height: 1.82;
      color: #223141;
      animation: fade-in 260ms ease-out;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4 {
      color: #10273c;
      line-height: 1.35;
      margin: 1.3em 0 0.55em;
      scroll-margin-top: 18px;
    }

    .markdown-body h1 {
      font-family: "ZCOOL XiaoWei", "Noto Sans SC", serif;
      font-weight: 400;
      font-size: clamp(30px, 4vw, 40px);
      border-bottom: 2px solid #d6e2ee;
      padding-bottom: 0.28em;
    }

    .markdown-body h1.paper-main-title {
      text-align: center;
    }

    .markdown-body h2 {
      font-size: clamp(22px, 2.8vw, 30px);
      border-left: 6px solid #8cc0e8;
      padding-left: 10px;
      margin-top: 1.6em;
    }

    .markdown-body h3 {
      font-size: 20px;
    }

    .markdown-body p {
      margin: 0.7em 0;
    }

    .markdown-body ul,
    .markdown-body ol {
      margin: 0.6em 0;
      padding-left: 1.6em;
    }

    .markdown-body li + li {
      margin-top: 0.28em;
    }

    .markdown-body a {
      color: var(--accent-2);
    }

    .markdown-body pre {
      margin: 0.9em 0;
      background: #12273a;
      color: #e6edf3;
      border-radius: 12px;
      padding: 14px;
      overflow: auto;
      border: 1px solid #1e3f5d;
    }

    .markdown-body code {
      font-family: "SFMono-Regular", Menlo, Consolas, monospace;
      background: #e9f1f7;
      border-radius: 4px;
      padding: 0.06em 0.3em;
      font-size: 0.9em;
    }

    .markdown-body pre code {
      background: transparent;
      padding: 0;
    }

    .markdown-body table,
    .rendered-table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.9em 0;
      overflow: hidden;
      border-radius: 10px;
      border: 1px solid #d8e0ea;
    }

    .markdown-body th,
    .markdown-body td,
    .rendered-table th,
    .rendered-table td {
      border: 1px solid #d8e0ea;
      padding: 10px 11px;
      text-align: left;
      vertical-align: top;
    }

    .markdown-body th,
    .rendered-table th {
      background: #f0f6fb;
      color: #1b3f5c;
      font-weight: 700;
    }

    .markdown-body blockquote {
      margin: 1em 0;
      padding: 8px 14px;
      border-left: 4px solid #99b7d0;
      background: #f3f8fd;
      color: #344d63;
    }

    .markdown-body img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 12px auto;
      border-radius: 12px;
      border: 1px solid #d0dcea;
      box-shadow: 0 8px 28px rgba(20, 50, 76, 0.14);
    }

    .markdown-body details {
      margin: 0.7em 0;
      padding: 8px 10px;
      background: #f8fbff;
      border: 1px dashed #bfd2e6;
      border-radius: 10px;
    }

    .markdown-body summary {
      cursor: pointer;
      font-weight: 700;
      color: #214766;
    }

    .to-top {
      position: fixed;
      right: 14px;
      bottom: 14px;
      border: 0;
      border-radius: 999px;
      width: 42px;
      height: 42px;
      font-size: 18px;
      background: #0f766e;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(15, 118, 110, 0.25);
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 140ms ease, transform 140ms ease;
      z-index: 30;
    }

    .to-top.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1060px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .toc {
        position: static;
        max-height: 320px;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <p class="eyebrow">CitizenChain Whitepaper</p>
    <h1>公民币区块链白皮书</h1>
  </header>

  <div class="layout">
    <aside class="toc">
      <h2>页面目录</h2>
      <nav id="toc-nav"></nav>
    </aside>

    <main class="paper">
      <article id="content" class="markdown-body">
        <p>正在加载 README.md ...</p>
      </article>
    </main>
  </div>

  <button id="to-top" class="to-top" type="button" aria-label="回到顶部">↑</button>

  <script>
    const readmePath = "https://raw.githubusercontent.com/ChinaNation/GMB/main/README.md";
    const contentEl = document.getElementById("content");
    const tocEl = document.querySelector(".toc");
    const tocNavEl = document.getElementById("toc-nav");
    const toTopEl = document.getElementById("to-top");
    let tocWheelHandler = null;
    let tocWheelDeltaBuffer = 0;
    let tocWheelIndex = 0;
    let tocObserver = null;
    let tocActiveId = "";
    let tocItemsInOrder = [];
    const tocLinkById = new Map();
    const tocNodeById = new Map();
    const tocItemById = new Map();
    const tocExpanded = new Set();

    function escapeHtml(input) {
      return input
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function slugify(text, usedMap) {
      const compact = text.trim().toLowerCase()
        .replace(/[^\p{L}\p{N}\s-]/gu, "")
        .replace(/\s+/g, "-")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "");
      const base = compact || "section";
      const index = usedMap.get(base) || 0;
      usedMap.set(base, index + 1);
      return index === 0 ? base : base + "-" + String(index);
    }

    function splitPipeRow(line) {
      return line.trim()
        .replace(/^\|/, "")
        .replace(/\|$/, "")
        .split("|")
        .map((item) => item.trim());
    }

    function parseMarkdownTable(rawText) {
      const lines = rawText.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
      if (lines.length < 2) return null;
      if (!lines[0].includes("|")) return null;
      if (!/^\|?[:\-| ]+\|?$/.test(lines[1])) return null;

      const headers = splitPipeRow(lines[0]);
      const alignRaw = splitPipeRow(lines[1]);
      const aligns = alignRaw.map((cell) => {
        if (cell.startsWith(":") && cell.endsWith(":")) return "center";
        if (cell.endsWith(":")) return "right";
        return "left";
      });

      const rows = lines.slice(2).map(splitPipeRow);
      const thead = "<thead><tr>" +
        headers.map((text, idx) => "<th style=\"text-align:" + aligns[idx] + "\">" + escapeHtml(text) + "</th>").join("") +
        "</tr></thead>";
      const tbody = "<tbody>" +
        rows.map((cells) => {
          const normalized = headers.map((_, idx) => cells[idx] || "");
          return "<tr>" + normalized.map((text, idx) => "<td style=\"text-align:" + aligns[idx] + "\">" + escapeHtml(text) + "</td>").join("") + "</tr>";
        }).join("") +
        "</tbody>";

      return "<table class=\"rendered-table\">" + thead + tbody + "</table>";
    }

    function upgradeTableCodeBlocks(rootEl) {
      const codeBlocks = rootEl.querySelectorAll("pre > code");
      codeBlocks.forEach((block) => {
        const tableHtml = parseMarkdownTable(block.textContent || "");
        if (!tableHtml) return;
        const preEl = block.closest("pre");
        if (!preEl) return;
        const wrapper = document.createElement("div");
        wrapper.innerHTML = tableHtml;
        preEl.replaceWith(wrapper.firstElementChild);
      });
    }

    function stripInlineToc(rootEl) {
      const normalize = (value) => (value || "").replace(/\s+/g, "");
      const headings = rootEl.querySelectorAll("h1, h2, h3");
      let tocHeading = null;

      headings.forEach((heading) => {
        if (tocHeading) return;
        if (normalize(heading.textContent) === "目录") {
          tocHeading = heading;
        }
      });

      if (!tocHeading) return;

      let node = tocHeading.nextElementSibling;
      tocHeading.remove();

      while (node) {
        const nextNode = node.nextElementSibling;
        if (/^H[1-6]$/.test(node.tagName)) break;
        node.remove();
        node = nextNode;
      }
    }

    function stripHorizontalRules(rootEl) {
      const isRuleText = (text) => {
        const compact = (text || "").replace(/\s+/g, "");
        return /^[-*]{3,}$/.test(compact);
      };

      rootEl.querySelectorAll("hr").forEach((el) => el.remove());
      rootEl.querySelectorAll("p").forEach((el) => {
        if (isRuleText(el.textContent)) {
          el.remove();
        }
      });
      rootEl.querySelectorAll("ul,ol").forEach((list) => {
        const items = Array.from(list.children).filter((node) => node.tagName === "LI");
        if (!items.length) return;
        const allRuleItems = items.every((item) => /^[-*]+$/.test((item.textContent || "").trim()));
        if (allRuleItems) {
          list.remove();
        }
      });
    }

    function centerWhitepaperBodyTitle(rootEl) {
      const headings = rootEl.querySelectorAll("h1");
      headings.forEach((heading) => {
        const compact = (heading.textContent || "").replace(/\s+/g, "");
        const normalized = compact.replace(/[<>《》]/g, "");
        if (normalized === "公民币区块链白皮书") {
          heading.classList.add("paper-main-title");
        }
      });
    }

    function inferTocLevel(text, fallbackLevel) {
      if (/^\d+\.\d+\.\d+/.test(text)) return 3;
      if (/^\d+\.\d+/.test(text)) return 2;
      if (/^\d+[\.\u3002、)\s]/.test(text)) return 1;
      if (/^第[一二三四五六七八九十百千万0-9]+章/.test(text)) return 1;
      if (/^第[一二三四五六七八九十百千万0-9]+节/.test(text)) return 2;
      if (/^第[一二三四五六七八九十百千万0-9]+条/.test(text)) return 3;
      return fallbackLevel;
    }

    function buildTocTree(items) {
      const roots = [];
      const stack = [];
      items.forEach((item) => {
        item.children = [];
        item.parentId = null;
        while (stack.length && stack[stack.length - 1].level >= item.level) {
          stack.pop();
        }
        if (stack.length) {
          const parent = stack[stack.length - 1];
          item.parentId = parent.id;
          parent.children.push(item);
        } else {
          roots.push(item);
        }
        stack.push(item);
      });
      return roots;
    }

    function getVisibleAncestorId(id) {
      let currentId = id;
      while (currentId) {
        const link = tocLinkById.get(currentId);
        if (link && link.offsetParent !== null) {
          return currentId;
        }
        const item = tocItemById.get(currentId);
        currentId = item ? item.parentId : null;
      }
      return id;
    }

    function setTocActive(id) {
      if (!id) return;
      const displayId = getVisibleAncestorId(id);
      const lastDisplayId = getVisibleAncestorId(tocActiveId);
      if (lastDisplayId && tocLinkById.has(lastDisplayId)) {
        tocLinkById.get(lastDisplayId).classList.remove("active");
      }
      if (displayId && tocLinkById.has(displayId)) {
        tocLinkById.get(displayId).classList.add("active");
      }
      tocActiveId = id;
    }

    function toggleTocNode(id) {
      const node = tocNodeById.get(id);
      if (!node) return;
      if (tocExpanded.has(id)) {
        tocExpanded.delete(id);
        node.classList.remove("expanded");
      } else {
        tocExpanded.add(id);
        node.classList.add("expanded");
      }
    }

    function renderTocNode(item) {
      const hasChildren = item.children && item.children.length > 0;
      const node = document.createElement("div");
      node.className = "toc-node level-" + String(item.level) + (hasChildren ? " branch" : " leaf");
      node.dataset.id = item.id;
      if (hasChildren && tocExpanded.has(item.id)) {
        node.classList.add("expanded");
      }
      tocNodeById.set(item.id, node);

      const row = hasChildren ? document.createElement("button") : document.createElement("a");
      row.className = "toc-link toc-row " + (hasChildren ? "branch" : "leaf") + " level-" + String(item.level);
      row.dataset.id = item.id;

      if (hasChildren) {
        row.type = "button";
        row.addEventListener("click", () => {
          toggleTocNode(item.id);
        });
      } else {
        row.href = "#" + item.id;
        row.addEventListener("click", (event) => {
          event.preventDefault();
          const heading = document.getElementById(item.id);
          if (heading) {
            heading.scrollIntoView({ behavior: "smooth", block: "start" });
            setTocActive(item.id);
          }
        });
      }

      const caret = document.createElement("span");
      caret.className = "toc-caret";
      caret.textContent = hasChildren ? "▸" : "•";

      const text = document.createElement("span");
      text.className = "toc-text";
      text.textContent = item.text;

      row.append(caret, text);
      node.appendChild(row);
      tocLinkById.set(item.id, row);

      if (hasChildren) {
        const children = document.createElement("div");
        children.className = "toc-children";
        item.children.forEach((child) => {
          children.appendChild(renderTocNode(child));
        });
        node.appendChild(children);
      }

      return node;
    }

    function getCurrentTocIndex() {
      if (!tocItemsInOrder.length) return 0;
      const probeY = window.scrollY + 220;
      let index = 0;
      tocItemsInOrder.forEach((item, i) => {
        const heading = document.getElementById(item.id);
        if (!heading) return;
        const absoluteTop = heading.getBoundingClientRect().top + window.scrollY;
        if (absoluteTop <= probeY) {
          index = i;
        }
      });
      return index;
    }

    function bindTocWheelSync() {
      if (!tocEl) return;
      if (tocWheelHandler) {
        tocEl.removeEventListener("wheel", tocWheelHandler);
        tocWheelHandler = null;
      }
      if (!tocItemsInOrder.length) return;
      tocWheelDeltaBuffer = 0;
      const WHEEL_STEP = 32;

      tocWheelHandler = (event) => {
        if (Math.abs(event.deltaY) <= Math.abs(event.deltaX || 0)) return;
        event.preventDefault();

        const previousBuffer = tocWheelDeltaBuffer;
        tocWheelDeltaBuffer += event.deltaY;
        if ((previousBuffer > 0 && tocWheelDeltaBuffer < 0) || (previousBuffer < 0 && tocWheelDeltaBuffer > 0)) {
          tocWheelDeltaBuffer = event.deltaY;
        }

        const movesRaw = Math.trunc(tocWheelDeltaBuffer / WHEEL_STEP);
        if (movesRaw === 0) return;
        tocWheelDeltaBuffer -= movesRaw * WHEEL_STEP;

        const visibleLinks = Array.from(tocNavEl.querySelectorAll(".toc-row"))
          .filter((link) => link.offsetParent !== null);
        if (!visibleLinks.length) return;

        const activeVisibleId = getVisibleAncestorId(tocActiveId) || "";
        let currentIndex = visibleLinks.findIndex((link) => link.dataset.id === activeVisibleId);
        if (currentIndex < 0) {
          const fallbackId = tocItemsInOrder[getCurrentTocIndex()]?.id || "";
          const fallbackVisibleId = getVisibleAncestorId(fallbackId);
          currentIndex = visibleLinks.findIndex((link) => link.dataset.id === fallbackVisibleId);
        }
        if (currentIndex < 0) currentIndex = 0;

        const direction = movesRaw > 0 ? 1 : -1;
        const steps = Math.min(6, Math.abs(movesRaw));
        let nextIndex = currentIndex;
        for (let i = 0; i < steps; i += 1) {
          const candidate = nextIndex + direction;
          if (candidate < 0 || candidate >= visibleLinks.length) break;
          nextIndex = candidate;
        }
        if (nextIndex === currentIndex) return;

        const targetId = visibleLinks[nextIndex].dataset.id;
        if (!targetId) return;
        const target = document.getElementById(targetId);
        if (!target) return;

        const orderedIndex = tocItemsInOrder.findIndex((item) => item.id === targetId);
        if (orderedIndex >= 0) {
          tocWheelIndex = orderedIndex;
        }
        target.scrollIntoView({ behavior: "auto", block: "start" });
        visibleLinks[nextIndex].scrollIntoView({ block: "nearest" });
        setTocActive(targetId);
      };

      tocEl.addEventListener("wheel", tocWheelHandler, { passive: false });
    }

    function buildToc() {
      tocNavEl.innerHTML = "";
      tocLinkById.clear();
      tocNodeById.clear();
      tocItemById.clear();
      tocExpanded.clear();
      tocActiveId = "";

      if (tocObserver) {
        tocObserver.disconnect();
        tocObserver = null;
      }

      const headings = contentEl.querySelectorAll("h1, h2, h3");
      const used = new Map();
      const items = [];
      const normalizedPageTitle = ((document.querySelector(".hero h1")?.textContent) || "").replace(/\s+/g, "");

      headings.forEach((heading) => {
        const text = (heading.textContent || "").trim();
        if (!text) return;
        const normalized = text.replace(/\s+/g, "");
        if (normalized === "目录") return;
        if (normalizedPageTitle && normalized === normalizedPageTitle) return;
        const id = slugify(text, used);
        heading.id = id;
        const tagLevel = Number(heading.tagName.slice(1));
        const level = inferTocLevel(text, tagLevel);
        const item = { id, text, level, parentId: null, children: [] };
        items.push(item);
        tocItemById.set(id, item);
      });

      if (!items.length) {
        tocNavEl.innerHTML = "<p style=\"margin:8px 10px;color:#6b7280;\">暂无可用目录</p>";
        return;
      }

      tocItemsInOrder = items;
      const tree = buildTocTree(items);
      tree.forEach((item) => {
        tocNavEl.appendChild(renderTocNode(item));
      });

      const headingMap = new Map(tocItemsInOrder.map((item) => [item.id, item]));
      const indexById = new Map(items.map((item, idx) => [item.id, idx]));
      tocObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) return;
          const id = entry.target.id;
          if (!headingMap.has(id)) return;
          const idx = indexById.get(id);
          if (typeof idx === "number") {
            tocWheelIndex = idx;
          }
          setTocActive(id);
        });
      }, { rootMargin: "-40% 0px -45% 0px", threshold: 0.1 });

      tocItemsInOrder.forEach((item) => {
        const heading = document.getElementById(item.id);
        if (heading) tocObserver.observe(heading);
      });

      tocWheelIndex = getCurrentTocIndex();
      if (tocItemsInOrder[tocWheelIndex]) {
        setTocActive(tocItemsInOrder[tocWheelIndex].id);
      }
      bindTocWheelSync();
    }

    async function renderReadme() {
      if (!window.marked || !window.DOMPurify) {
        console.error("依赖加载失败：请检查网络后重试。");
        return;
      }

      try {
        const response = await fetch(readmePath, { cache: "no-store" });
        if (!response.ok) {
          throw new Error("HTTP " + String(response.status));
        }

        const markdown = await response.text();
        const html = window.marked.parse(markdown, {
          gfm: true,
          breaks: false,
          headerIds: false,
          mangle: false
        });
        contentEl.innerHTML = window.DOMPurify.sanitize(html);
        upgradeTableCodeBlocks(contentEl);
        stripInlineToc(contentEl);
        stripHorizontalRules(contentEl);
        centerWhitepaperBodyTitle(contentEl);
        buildToc();
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        const isFileMode = window.location.protocol === "file:";
        const hint = isFileMode ? "请在项目目录运行: python3 -m http.server 8080，然后访问 http://127.0.0.1:8080/README.web.html" : "";
        const detail = hint ? "<p>" + hint + "</p>" : "";
        contentEl.innerHTML = "<p>加载失败: " + message + "。</p>" + detail;
        buildToc();
      }
    }

    window.addEventListener("scroll", () => {
      toTopEl.classList.toggle("visible", window.scrollY > 260);
    });

    toTopEl.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    void renderReadme();
    globalThis.setInterval(() => {
      void renderReadme();
    }, 24 * 60 * 60 * 1000);
  </script>
</body>
